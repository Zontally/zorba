domain:
  id: "471829"
  number: 6
  name: "Engagement Delivery & Project Management"
  subtitle: "Managing the lifecycle of client engagements from mobilisation to close"
  classification: value_chain
  description: >
    This domain encompasses the firm's ability to plan, execute, and close
    client engagements effectively. In professional services, operations
    *is* delivery — project and programme management, resource scheduling,
    utilisation tracking, milestone management, and change control are
    the operational core of the business.

    In a ZORBA-enabled professional services firm, agents handle resource
    scheduling optimisation, timesheet analysis, milestone tracking,
    budget burn-rate monitoring, and automated status consolidation,
    while humans lead engagement governance, client steering committees,
    risk escalation, and the creative problem-solving that defines
    high-value delivery.
