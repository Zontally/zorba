  number: 3
  name: "Marketing & Practice Development"
  subtitle: "Building eminence and generating client opportunities through thought leadership"
  classification: value_chain
  description: >
    This domain encompasses the firm's ability to build market presence,
    develop practice eminence, and generate client opportunities. In
    professional services, marketing is deeply intertwined with practice
    development — thought leadership, conference speaking, published
    research, and executive relationship-building are primary demand
    generation tools rather than digital campaigns alone.

    In a ZORBA-enabled professional services firm, agents handle content
    distribution, event logistics, CRM data enrichment, and marketing
    analytics, while humans drive thought leadership creation, keynote
    delivery, and strategic relationship cultivation.
