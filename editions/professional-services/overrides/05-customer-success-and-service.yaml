domain:
  id: "841267"
  number: 5
  name: "Client Engagement & Delivery Excellence"
  subtitle: "Delivering outcomes and building lasting client partnerships"
  classification: value_chain
  description: >
    This domain encompasses the firm's ability to deliver exceptional client
    outcomes and build enduring advisory relationships. In professional
    services, client success is inseparable from delivery — satisfaction
    is earned through engagement execution, not post-sale support functions.
    The focus is on delivery quality, stakeholder management, scope
    governance, and turning successful engagements into long-term
    partnerships.

    In a ZORBA-enabled professional services firm, agents monitor
    engagement health metrics, automate status reporting, track
    deliverable completion, and flag risks early, while humans manage
    client relationships, navigate organisational politics, and provide
    the expert judgement that defines advisory value.
