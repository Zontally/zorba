domain:
  id: "482917"
  number: 2
  name: "Service Design & Innovation"
  subtitle: "Crafting and evolving service offerings that clients value"
  classification: value_chain
  description: >
    This domain encompasses the firm's ability to design, package, and evolve
    its service offerings, methodologies, and intellectual property. In
    professional services, "products" are reusable frameworks, delivery
    accelerators, proprietary methodologies, and packaged service lines
    rather than physical or software products.

    In a ZORBA-enabled professional services firm, agents help codify
    methodologies, track offering performance metrics, and accelerate
    proposal content reuse, while humans focus on thought leadership,
    client-driven innovation, and practice strategy.

  capabilities:
    - id: "361742"
      number: "2.1"
      name: "Shape Service Strategy and Offering Portfolio"
      description: >
        Define the firm's service vision, establish practice and offering
        priorities, and maintain a coherent service strategy aligned to
        market demand and firm capabilities. This capability ensures
        investment in service lines is deliberate and balanced across
        established practices, emerging offerings, and innovation bets.
      processes:
        - id: "529184"
          number: "2.1.1"
          name: "Articulate the service vision and practice positioning"
          agentic_profile: H
          agentic_note: "Human-led; service vision requires market intuition and client insight"
        - id: "847263"
          number: "2.1.2"
          name: "Assess market opportunities and client demand patterns"
          agentic_profile: "h+A"
          agentic_note: "Agents scan markets, analyse win/loss data, and model demand; humans evaluate strategic fit"
        - id: "613427"
          number: "2.1.3"
          name: "Define and balance the service portfolio across practices"
          agentic_profile: "H+a"
          agentic_note: "Humans set portfolio mix; agents model revenue, utilisation, and margin trade-offs"
        - id: "295814"
          number: "2.1.4"
          name: "Establish offering investment criteria and funding models"
          agentic_profile: "H+a"
          agentic_note: "Humans define investment thresholds; agents track offering development costs"
        - id: "397366"
          number: "2.1.5"
          name: "Conduct periodic offering reviews and rationalisation"
          agentic_profile: "H=A"
          agentic_note: "Agents surface offering performance data; humans decide sunset or pivot"
        - id: "183624"
          number: "2.1.6"
          name: "Align service roadmaps with enterprise and client strategy"
          agentic_profile: "H+a"
          agentic_note: "Humans lead strategic alignment; agents track dependencies and conflicts"

    - id: "649281"
      number: "2.3"
      name: "Design and Package Service Offerings"
      description: >
        Define, structure, and package reusable service offerings including
        scope templates, delivery frameworks, pricing models, and
        staffing blueprints. Ensure offerings are market-ready and
        consistently deliverable across the practice.
      processes:
        - id: "453533"
          number: "2.3.1"
          name: "Define service offering scope and delivery framework"
          agentic_profile: "H+a"
          agentic_note: "Human-led offering design; agents assist with market data and competitive analysis"
        - id: "752095"
          number: "2.3.2"
          name: "Develop pricing models and commercial structures"
          agentic_profile: "H=A"
          agentic_note: "Agents model pricing scenarios and margin analysis; humans set commercial strategy"
        - id: "660643"
          number: "2.3.3"
          name: "Create delivery accelerators and reusable templates"
          agentic_profile: "h+A"
          agentic_note: "Agents codify and templatise proven delivery approaches; humans review and curate"
        - id: "924583"
          number: "2.3.4"
          name: "Define staffing blueprints and skill requirements per offering"
          agentic_profile: "H=A"
          agentic_note: "Agents map skill demand to available bench; humans validate and adjust"
        - id: "278061"
          number: "2.3.5"
          name: "Validate offering market readiness and pilot with clients"
          agentic_profile: H
          agentic_note: "Human-led; client relationships and commercial judgement drive pilot decisions"
