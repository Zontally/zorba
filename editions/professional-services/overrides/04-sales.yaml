domain:
  id: "358741"
  number: 4
  name: "Business Development & Client Acquisition"
  subtitle: "Winning work through relationships, proposals, and trusted advisory"
  classification: value_chain
  description: >
    This domain encompasses the firm's ability to identify, pursue, and win
    client engagements. In professional services, business development is
    relationship-led and proposal-driven rather than transactional. Win
    strategies centre on demonstrating domain expertise, assembling the
    right team, and navigating complex procurement processes including
    RFPs, framework agreements, and competitive tenders.

    In a ZORBA-enabled professional services firm, agents handle proposal
    assembly, competitive intelligence gathering, CRM hygiene, and bid
    coordination, while humans focus on client relationships, solution
    shaping, orals presentations, and commercial negotiation.
