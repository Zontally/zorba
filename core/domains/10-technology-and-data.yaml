    - id: "925743"
      number: "10.7"
      name: "Manage the Agent Platform"
      description: >
        Operate, evolve, and govern the infrastructure that enables enterprise AI agents —
        including agent hosting, orchestration, lifecycle management, and the tooling that
        connects agents to enterprise systems. This is the ZORBA-specific meta-capability:
        the technology that enables the blended workforce.
      processes:
        - id: "348261"
          number: "10.7.1"
          name: "Operate agent hosting infrastructure and runtime environments"
          agentic_profile: "H=A"
          agentic_note: "Agents monitor their own platform; humans manage capacity and architecture"
          measurements:
            - id: "103501"
              number: "10.7.1.M1"
              name: "Agent Platform Availability"
              what: "Percentage uptime of the agent hosting platform"
              why: "Platform downtime disables the entire agent workforce"
              how: "Platform uptime minutes / Total minutes x 100"
              frequency: monthly
              direction: higher_is_better
            - id: "103502"
              number: "10.7.1.M2"
              name: "Agent Platform Response Latency"
              what: "Average response latency of the agent runtime environment"
              why: "High latency degrades agent performance and user experience"
              how: "Average milliseconds for agent API response (p95)"
              frequency: daily
              direction: lower_is_better
        - id: "517948"
          number: "10.7.2"
          name: "Manage agent lifecycle — provisioning, versioning, and retirement"
          agentic_profile: "H+a"
          agentic_note: "Humans approve agent deployment; agents manage version control and rollback"
          measurements:
            - id: "103601"
              number: "10.7.2.M1"
              name: "Agent Version Currency"
              what: "Percentage of agents running the latest approved version"
              why: "Outdated versions miss fixes and improvements"
              how: "Agents on latest version / Total active agents x 100"
              frequency: monthly
              direction: higher_is_better
            - id: "103602"
              number: "10.7.2.M2"
              name: "Agent Rollback Rate"
              what: "Percentage of agent version updates requiring rollback"
              why: "High rollback rate indicates poor release quality"
              how: "Rollbacks / Total version updates x 100"
              frequency: monthly
              direction: lower_is_better
        - id: "264839"
          number: "10.7.3"
          name: "Govern agent access to enterprise systems and data"
          agentic_profile: H
          agentic_note: "Human-led; access decisions require accountability and policy alignment"
          measurements:
            - id: "103701"
              number: "10.7.3.M1"
              name: "Agent Access Policy Compliance"
              what: "Percentage of agent system access conforming to approved policies"
              why: "Non-compliant access creates security and data risk"
              how: "Compliant access grants / Total agent access grants x 100"
              frequency: monthly
              direction: higher_is_better
            - id: "103702"
              number: "10.7.3.M2"
              name: "Agent Access Review Completion"
              what: "Percentage of agent access reviews completed on schedule"
              why: "Stale access grants accumulate excessive permissions"
              how: "Completed reviews / Scheduled reviews x 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "893162"
