  wardley_map:
    owm_source: |
      title Technology & Data Domain - Evolution View
      
      # User-facing capabilities
      component "Digital Products" [0.9, 0.6]
      component "Business Intelligence" [0.8, 0.7]
      component "Data Analytics" [0.7, 0.4]
      
      # Core capabilities (mapped from ZORBA domain)
      component "Technology Strategy" [0.2, 0.3]
      component "Application Development" [0.7, 0.6]
      component "Cloud Infrastructure" [0.5, 0.8]
      component "Data Platform" [0.6, 0.4]
      component "Cybersecurity" [0.4, 0.7]
      component "IT Operations" [0.3, 0.9]
      component "Agent Platform" [0.4, 0.1]
      
      # Dependencies
      "Digital Products"->"Application Development"
      "Digital Products"->"Data Platform"
      "Business Intelligence"->"Data Platform"
      "Data Analytics"->"Data Platform"
      "Application Development"->"Cloud Infrastructure"
      "Data Platform"->"Cloud Infrastructure"
      "Cloud Infrastructure"->"IT Operations"
      "Agent Platform"->"Cloud Infrastructure"
      "Application Development"->"Technology Strategy"
      "Data Platform"->"Technology Strategy"
      
      # Evolution movements
      evolve "Agent Platform" 0.2
      evolve "Data Platform" 0.5
      evolve "Cloud Infrastructure" 0.9
      
      # PST annotations
      note "PIONEER: Agent platform - experimental, human-led innovation" [0.4, 0.05]
      note "SETTLER: Application development - standardising practices" [0.7, 0.55]
      note "SETTLER: Data platform - industrialising analytics" [0.6, 0.35]
      note "TOWN PLANNER: Cloud infrastructure - utility operations" [0.5, 0.75]
      note "TOWN PLANNER: IT operations - efficiency-focused" [0.3, 0.85]
      
      pipeline "Data Evolution Path" [0.4, 0.5]
      pipeline "Agent Platform Maturation" [0.1, 0.2]
    map_scope: domain
    evolution_context: |
      This map shows the Technology & Data domain capabilities at different evolution stages.
      The Agent Platform (10.7) is at Genesis/Pioneer phase - requiring human-led innovation.
      Data capabilities (10.4) are transitioning from Custom/Settler toward Product.
      Infrastructure capabilities (10.3, 10.6) are at Commodity/Town Planner - prime for agent automation.
      PST phases directly inform workforce composition: Pioneers need humans, Town Planners can use agents.
