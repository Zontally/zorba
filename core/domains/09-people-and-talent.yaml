    - id: "938214"
      number: "9.7"
      name: "Manage the Blended Workforce"
      description: >
        ZORBA-specific capability. Provision, configure, monitor, and govern the agent workforce
        alongside the human workforce — ensuring agents are treated as managed participants in
        the operating model with defined roles, performance expectations, trust boundaries, and
        lifecycle management.
      processes:
        - id: "427813"
          number: "9.7.1"
          name: "Provision and configure new agents into the workforce"
          agentic_profile: "H=A"
          agentic_note: "Agents automate provisioning workflows; humans approve agent deployment and role assignment"
          measurements:
            - id: "093401"
              number: "9.7.1.M1"
              name: "Agent Provisioning Cycle Time"
              what: "Average days from agent request to production deployment"
              why: "Faster provisioning accelerates time-to-value"
              how: "Average business days from approved request to active agent"
              frequency: monthly
              direction: lower_is_better
            - id: "093402"
              number: "9.7.1.M2"
              name: "Agent Provisioning Success Rate"
              what: "Percentage of agent deployments completed without rollback"
              why: "Failed deployments waste resources and delay capabilities"
              how: "Successful deployments / Total deployment attempts x 100"
              frequency: monthly
              direction: higher_is_better
        - id: "583146"
          number: "9.7.2"
          name: "Define agent roles, responsibilities, and trust boundaries"
          agentic_profile: "H+a"
          agentic_note: "Humans define trust levels and guardrails; agents maintain the role registry"
          measurements:
            - id: "093501"
              number: "9.7.2.M1"
              name: "Agent Role Definition Coverage"
              what: "Percentage of active agents with documented roles and trust boundaries"
              why: "Undefined boundaries create governance and safety risks"
              how: "Agents with complete role definitions / Total active agents x 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "093502"
              number: "9.7.2.M2"
              name: "Trust Boundary Violation Rate"
              what: "Number of agent actions outside defined trust boundaries per 1000 actions"
              why: "Violations indicate misconfiguration or policy gaps"
              how: "Boundary violations / Total agent actions x 1000"
              frequency: monthly
              direction: lower_is_better
        - id: "719432"
          number: "9.7.3"
          name: "Monitor agent performance and behavioural compliance"
          agentic_profile: "h+A"
          agentic_note: "Agents monitor agent fleet metrics and flag anomalies; humans investigate and intervene"
          measurements:
            - id: "093601"
              number: "9.7.3.M1"
              name: "Agent Performance SLA Compliance"
              what: "Percentage of agents meeting defined performance SLAs"
              why: "Underperforming agents reduce blended workforce effectiveness"
              how: "Agents meeting SLA / Total active agents x 100"
              frequency: monthly
              direction: higher_is_better
            - id: "093602"
              number: "9.7.3.M2"
              name: "Agent Anomaly Detection Rate"
              what: "Percentage of agent anomalies detected before business impact"
              why: "Early detection prevents downstream errors and compliance breaches"
              how: "Anomalies detected proactively / Total anomalies x 100"
              frequency: monthly
              direction: higher_is_better
        - id: "264891"
          number: "9.7.4"
          name: "Calibrate agent trust levels and autonomy thresholds"
          agentic_profile: "H+a"
          agentic_note: "Humans set trust policy; agents track performance and recommend recalibration"
          measurements:
            - id: "093701"
              number: "9.7.4.M1"
              name: "Trust Level Calibration Frequency"
              what: "Average number of trust level reviews per agent per year"
              why: "Regular calibration ensures trust levels reflect current performance"
              how: "Total trust reviews / Total active agents"
              frequency: quarterly
              direction: higher_is_better
            - id: "093702"
              number: "9.7.4.M2"
              name: "Trust Escalation Rate"
              what: "Percentage of agents with trust levels increased based on performance"
              why: "Progression indicates agents are maturing and earning autonomy"
              how: "Agents with increased trust / Total agents reviewed x 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "835617"
          number: "9.7.5"
          name: "Manage the agent lifecycle — updates, retraining, and retirement"
          agentic_profile: "H=A"
          agentic_note: "Agents execute lifecycle workflows; humans approve major transitions and decommissioning"
          measurements:
            - id: "093801"
              number: "9.7.5.M1"
              name: "Agent Update Compliance Rate"
              what: "Percentage of agents on current approved versions"
              why: "Outdated agents may have security or performance issues"
              how: "Agents on current version / Total active agents x 100"
              frequency: monthly
              direction: higher_is_better
            - id: "093802"
              number: "9.7.5.M2"
              name: "Agent Retirement Timeliness"
              what: "Percentage of deprecated agents retired within target timeframe"
              why: "Lingering deprecated agents consume resources and create risk"
              how: "Agents retired on time / Total flagged for retirement x 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "391528"
          number: "9.7.6"
