              number: "9.7.7.M1"
              name: "Blended Workforce Report Timeliness"
              what: "Percentage of workforce composition reports delivered on schedule"
              why: "Timely reporting enables proactive workforce management"
              how: "On-time reports / Total scheduled reports x 100"
              frequency: monthly
              direction: higher_is_better
            - id: "094002"
              number: "9.7.7.M2"
              name: "Agent-to-Human Ratio Trend"
              what: "Ratio of agent FTE-equivalents to human FTEs over time"
