    - id: "815423"
      number: "2.4"
      name: "Manage the Innovation Pipeline and Experimentation"
      description: >
        Operate a structured pipeline for innovation — from early-stage ideas through to
        funded initiatives — ensuring a healthy flow of experiments, validated learning,
        and scaled innovations.
      processes:
        - id: "372948"
          number: "2.4.1"
          name: "Operate the idea intake and evaluation process"
          agentic_profile: "H=A"
          agentic_note: "Agents collect and deduplicate submissions; humans evaluate merit"
          measurements:
            - id: "021801"
              number: "2.4.1.M1"
              name: "Idea Submission Volume"
              what: "Number of new ideas submitted per period"
              why: "Low volume indicates weak innovation culture"
              how: "Count of ideas submitted"
              frequency: monthly
              direction: higher_is_better
            - id: "021802"
              number: "2.4.1.M2"
              name: "Idea Evaluation Cycle Time"
              what: "Days from submission to initial evaluation"
              why: "Slow evaluation discourages submissions"
              how: "Evaluation date − submission date (business days)"
              frequency: monthly
              direction: lower_is_better
        - id: "594132"
          number: "2.4.2"
          name: "Design and run structured experiments"
          agentic_profile: "H+a"
          agentic_note: "Humans design experiments; agents automate execution and data capture"
          measurements:
