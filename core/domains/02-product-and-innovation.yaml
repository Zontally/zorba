    - id: "293814"
      number: "2.5"
      name: "Direct Research and Development Activities"
      description: >
        Plan, fund, and execute research and development programmes that generate new
        knowledge, technologies, and capabilities for future offerings and competitive
        knowledge, technologies, and capabilities for future offerings and competitive
        advantage.
      processes:
        - id: "641278"
          number: "2.5.1"
          name: "Define R&D strategy and research priorities"
          agentic_profile: H
          agentic_note: "Human-led; research direction requires scientific and strategic judgement"
          measurements:
            - id: "022401"
              number: "2.5.1.M1"
              name: "R&D Strategy Alignment"
              what: "Percentage of R&D programmes aligned to priorities"
              why: "Misaligned R&D wastes resources"
              how: "Aligned programmes / Total programmes × 100"
              frequency: annually
              direction: higher_is_better
            - id: "022402"
              number: "2.5.1.M2"
              name: "Research Priority Freshness"
              what: "Whether priorities are reviewed within cadence"
              why: "Stale priorities misallocate effort"
              how: "Days since last priority review vs planned cycle"
              frequency: annually
              direction: lower_is_better
        - id: "519346"
          number: "2.5.2"
          name: "Plan and allocate R&D budgets and resources"
          agentic_profile: "H+a"
          agentic_note: "Humans allocate; agents model scenarios and track burn rates"
          measurements:
