domain:
  id: "482917"
  number: 2
  name: "Product/Service & Innovation"
  subtitle: "Creating what customers and markets need next"
  name: "Product/Service & Innovation"
  subtitle: "Creating what customers and markets need next"
  classification: value_chain
  description: >
    This domain encompasses the enterprise's ability to envision, design, build, and evolve
    the products and services that deliver value to its customers and markets. It spans from
    early-stage ideation and research through to lifecycle management and retirement,
    early-stage ideation and research through to lifecycle management and retirement,
    including the intellectual property that protects competitive advantage.

    Whether an organisation delivers physical products, software, professional services, or a
    combination, this domain covers how offerings are conceived, validated, brought to market,
    and sustained. The specific shape varies by industry — product-led firms emphasise
    engineering and release cycles; service-led firms emphasise methodology design and
    offering packaging.

    Whether an organisation delivers physical products, software, professional services, or a
    combination, this domain covers how offerings are conceived, validated, brought to market,
    and sustained. The specific shape varies by industry — product-led firms emphasise
    engineering and release cycles; service-led firms emphasise methodology design and
    offering packaging.

    In a ZORBA-enabled enterprise, this domain is where agentic capabilities most visibly
    augment human creativity — with agents accelerating research synthesis, automating testing
    cycles, generating design variations, and providing real-time analytics that inform
    cycles, generating design variations, and providing real-time analytics that inform
    every decision from concept through sunset.

  capabilities:
    - id: "361742"
      number: "2.1"
      name: "Shape Offering Strategy and Portfolio Direction"
      name: "Shape Offering Strategy and Portfolio Direction"
      description: >
        Define the overarching product/service vision, establish portfolio priorities, and
        maintain a coherent offering strategy aligned to enterprise goals. This capability
        ensures investments in offerings are deliberate and balanced across horizons.
        Define the overarching product/service vision, establish portfolio priorities, and
        maintain a coherent offering strategy aligned to enterprise goals. This capability
        ensures investments in offerings are deliberate and balanced across horizons.
      processes:
        - id: "529184"
          number: "2.1.1"
          name: "Articulate the offering vision and strategic positioning"
          name: "Articulate the offering vision and strategic positioning"
          agentic_profile: H
          agentic_note: "Human-led; offering vision requires authentic market intuition"
          measurements:
            - id: "020101"
              number: "2.1.1.M1"
              name: "Offering Vision Clarity Score"
              what: "Stakeholder understanding of offering vision"
              why: "Unclear vision leads to misaligned decisions"
              how: "Stakeholder survey score on vision clarity (1-10)"
              frequency: annually
              direction: higher_is_better
            - id: "020102"
              number: "2.1.1.M2"
              name: "Positioning Differentiation Score"
              what: "Perceived differentiation from competitors"
              why: "Weak differentiation reduces pricing power"
              how: "Customer perception differentiation score (1-10)"
              frequency: annually
              direction: higher_is_better
        - id: "847263"
          number: "2.1.2"
          name: "Assess market opportunities and whitespace analysis"
          agentic_profile: "h+A"
          agentic_note: "Agents scan markets and model addressable opportunities; humans evaluate strategic fit"
          measurements:
            - id: "020201"
              number: "2.1.2.M1"
              name: "Market Opportunity Coverage"
              what: "Percentage of segments evaluated"
              why: "Unevaluated segments represent missed revenue"
              how: "Segments evaluated / Total segments × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "020202"
              number: "2.1.2.M2"
              name: "Whitespace Identification Rate"
              what: "New whitespace opportunities identified per quarter"
              why: "Continuous identification fuels growth"
              how: "Count of new whitespace opportunities"
              frequency: quarterly
              direction: higher_is_better
        - id: "613427"
          number: "2.1.3"
          name: "Define and balance the offering portfolio across horizons"
          name: "Define and balance the offering portfolio across horizons"
          agentic_profile: "H+a"
          agentic_note: "Humans set portfolio mix; agents model resource trade-offs"
          measurements:
            - id: "020301"
              number: "2.1.3.M1"
              name: "Portfolio Balance Score"
              what: "Distribution of investments across horizons"
              why: "Imbalanced portfolios create growth gaps"
              how: "Deviation from target horizon allocation (percentage points)"
              frequency: quarterly
              direction: lower_is_better
            - id: "020302"
              number: "2.1.3.M2"
              name: "Portfolio Strategic Alignment"
              what: "Percentage of investments linked to strategic priorities"
              why: "Unlinked investments represent drift"
              how: "Investments linked / Total investments × 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "295814"
          number: "2.1.4"
          name: "Establish offering investment criteria and funding models"
          name: "Establish offering investment criteria and funding models"
          agentic_profile: "H+a"
          agentic_note: "Humans define criteria; agents benchmark against industry norms"
          measurements:
            - id: "020401"
              number: "2.1.4.M1"
              name: "Investment Criteria Application"
              what: "Percentage of decisions evaluated against criteria"
              why: "Ad-hoc decisions reduce portfolio quality"
              how: "Decisions using criteria / Total decisions × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "020402"
              number: "2.1.4.M2"
              name: "Investment Decision Cycle Time"
              what: "Days from request to decision"
              why: "Slow decisions delay time-to-market"
              how: "Decision date − request date (business days)"
              frequency: quarterly
              direction: lower_is_better
        - id: "738562"
          number: "2.1.5"
          name: "Conduct periodic portfolio reviews and rationalisation"
          agentic_profile: "H=A"
          agentic_note: "Agents compile performance data; humans decide keep/kill/invest"
