            - id: "020502"
              number: "2.1.5.M2"
              name: "Rationalisation Actions Taken"
              what: "Keep/kill/invest decisions per review cycle"
              why: "Active rationalisation ensures portfolio health"
              how: "Count of formal portfolio decisions per review"
              frequency: quarterly
              direction: higher_is_better
        - id: "184239"
          number: "2.1.6"
          name: "Align offering roadmaps with enterprise strategy"
          name: "Align offering roadmaps with enterprise strategy"
          agentic_profile: "H=A"
          agentic_note: "Agents flag misalignments; humans resolve strategic tensions"
          measurements:
            - id: "020601"
              number: "2.1.6.M1"
              name: "Roadmap-Strategy Alignment"
              what: "Percentage of roadmap items traceable to strategy"
              why: "Misaligned roadmaps waste resources"
              how: "Items with strategic links / Total items × 100"
              frequency: quarterly
              direction: higher_is_better
