domain:
  id: "482917"
  number: 2
  name: "Product & Innovation"
  subtitle: "Creating what the market needs next"
  classification: value_chain
  description: >
    This domain encompasses the enterprise's ability to envision, design, build, and evolve
    the products and services that deliver value to its customers and markets. It spans from
    early-stage ideation and research through to product lifecycle management and retirement,
    including the intellectual property that protects competitive advantage.

    In a ZORBA-enabled enterprise, this domain is where agentic capabilities most visibly
    augment human creativity — with agents accelerating research synthesis, automating testing
    cycles, generating design variations, and providing real-time product analytics that inform
    every decision from concept through sunset.

  capabilities:
    - id: "361742"
      number: "2.1"
      name: "Shape Product Strategy and Portfolio Direction"
      description: >
        Define the overarching product vision, establish portfolio priorities, and maintain
        a coherent product strategy aligned to enterprise goals. This capability ensures
        product investments are deliberate and balanced across horizons.
      processes:
        - id: "529184"
          number: "2.1.1"
          name: "Articulate the product vision and strategic positioning"
          agentic_profile: H
          agentic_note: "Human-led; product vision requires authentic market intuition"
        - id: "847263"
          number: "2.1.2"
          name: "Assess market opportunities and whitespace analysis"
          agentic_profile: "h+A"
          agentic_note: "Agents scan markets and model TAM; humans evaluate strategic fit"
        - id: "613427"
          number: "2.1.3"
          name: "Define and balance the product portfolio across horizons"
          agentic_profile: "H+a"
          agentic_note: "Humans set portfolio mix; agents model resource trade-offs"
        - id: "295814"
          number: "2.1.4"
          name: "Establish product investment criteria and funding models"
          agentic_profile: "H+a"
          agentic_note: "Humans define criteria; agents benchmark against industry norms"
        - id: "738562"
          number: "2.1.5"
          name: "Conduct periodic portfolio reviews and rationalisation"
          agentic_profile: "H=A"
          agentic_note: "Agents compile performance data; humans decide keep/kill/invest"
        - id: "184239"
          number: "2.1.6"
          name: "Align product roadmaps with enterprise strategy"
          agentic_profile: "H=A"
          agentic_note: "Agents flag misalignments; humans resolve strategic tensions"

    - id: "527163"
      number: "2.2"
      name: "Discover and Validate Product Opportunities"
      description: >
        Systematically identify, explore, and validate new product concepts before committing
        significant development resources. This capability bridges insight and action through
        structured experimentation.
      processes:
        - id: "493821"
          number: "2.2.1"
          name: "Gather and synthesise customer needs and pain points"
          agentic_profile: "h+A"
          agentic_note: "Agents aggregate feedback from multiple channels; humans identify patterns"
        - id: "716348"
          number: "2.2.2"
          name: "Generate and explore product concepts and ideas"
          agentic_profile: "H=A"
          agentic_note: "Agents generate concept variations and provocations; humans curate and refine"
        - id: "382519"
          number: "2.2.3"
          name: "Conduct rapid prototyping and concept testing"
          agentic_profile: "H=A"
          agentic_note: "Agents build prototype simulations; humans evaluate user response"
        - id: "861234"
          number: "2.2.4"
          name: "Validate market demand and willingness to pay"
          agentic_profile: "h+A"
          agentic_note: "Agents run conjoint analyses and survey automation; humans interpret signals"
        - id: "254697"
          number: "2.2.5"
          name: "Build and assess business cases for new products"
          agentic_profile: "H=A"
          agentic_note: "Agents model financials and scenarios; humans judge viability"

    - id: "649281"
      number: "2.3"
      name: "Design and Engineer Products and Services"
      description: >
        Execute the core design and engineering work that transforms validated concepts into
        market-ready products. This capability covers requirements definition, architecture,
        development, and quality assurance.
      processes:
        - id: "514738"
          number: "2.3.1"
          name: "Define product requirements and acceptance criteria"
          agentic_profile: "H+a"
          agentic_note: "Humans specify requirements; agents structure and cross-reference"
        - id: "928471"
          number: "2.3.2"
          name: "Design product architecture and technical specifications"
          agentic_profile: "H+a"
          agentic_note: "Humans architect; agents generate documentation and check consistency"
        - id: "347165"
          number: "2.3.3"
          name: "Execute product development and build cycles"
          agentic_profile: "H=A"
          agentic_note: "Agents assist with code generation, component design; humans lead creation"
        - id: "763829"
          number: "2.3.4"
          name: "Conduct quality assurance and automated testing"
          agentic_profile: "h+A"
          agentic_note: "Agents execute test suites and regression tests; humans define test strategy"
        - id: "481592"
          number: "2.3.5"
          name: "Manage product configuration and variant engineering"
          agentic_profile: "H=A"
          agentic_note: "Agents manage configuration matrices; humans approve variant decisions"
        - id: "629413"
          number: "2.3.6"
          name: "Perform usability and accessibility validation"
          agentic_profile: "H=A"
          agentic_note: "Agents run automated accessibility checks; humans conduct user testing"

    - id: "815423"
      number: "2.4"
      name: "Manage the Innovation Pipeline and Experimentation"
      description: >
        Operate a structured pipeline for innovation — from early-stage ideas through to
        funded initiatives — ensuring a healthy flow of experiments, validated learning,
        and scaled innovations.
      processes:
        - id: "372948"
          number: "2.4.1"
          name: "Operate the idea intake and evaluation process"
          agentic_profile: "H=A"
          agentic_note: "Agents collect and deduplicate submissions; humans evaluate merit"
        - id: "594132"
          number: "2.4.2"
          name: "Design and run structured experiments"
          agentic_profile: "H+a"
          agentic_note: "Humans design experiments; agents automate execution and data capture"
        - id: "148726"
          number: "2.4.3"
          name: "Track innovation portfolio health and stage-gate progression"
          agentic_profile: "h+A"
          agentic_note: "Agents track metrics and flag stalled initiatives; humans intervene"
        - id: "831264"
          number: "2.4.4"
          name: "Scale validated innovations into core products"
          agentic_profile: "H+a"
          agentic_note: "Humans lead scaling decisions; agents coordinate handover logistics"
        - id: "267953"
          number: "2.4.5"
          name: "Foster innovation culture and internal entrepreneurship"
          agentic_profile: H
          agentic_note: "Human-led; cultural change requires human leadership and modelling"
        - id: "425189"
          number: "2.4.6"
          name: "Manage external innovation partnerships and sourcing"
          agentic_profile: "H+a"
          agentic_note: "Humans manage relationships; agents scout and screen opportunities"

    - id: "293814"
      number: "2.5"
      name: "Direct Research and Development Activities"
      description: >
        Plan, fund, and execute research and development programmes that generate new
        knowledge, technologies, and capabilities for future products and competitive
        advantage.
      processes:
        - id: "641278"
          number: "2.5.1"
          name: "Define R&D strategy and research priorities"
          agentic_profile: H
          agentic_note: "Human-led; research direction requires scientific and strategic judgement"
        - id: "519346"
          number: "2.5.2"
          name: "Plan and allocate R&D budgets and resources"
          agentic_profile: "H+a"
          agentic_note: "Humans allocate; agents model scenarios and track burn rates"
        - id: "872413"
          number: "2.5.3"
          name: "Execute research programmes and technical investigations"
          agentic_profile: "H+a"
          agentic_note: "Humans conduct research; agents assist with literature review and data analysis"
        - id: "364729"
          number: "2.5.4"
          name: "Manage research outcomes and technology transfer"
          agentic_profile: "H=A"
          agentic_note: "Agents catalogue findings and match to product needs; humans drive transfer"
        - id: "718534"
          number: "2.5.5"
          name: "Monitor technology trends and competitive R&D activity"
          agentic_profile: "h+A"
          agentic_note: "Agents continuously scan patent filings and publications; humans assess relevance"

    - id: "174628"
      number: "2.6"
      name: "Manage the Product Lifecycle End to End"
      description: >
        Govern the full lifecycle of each product from launch through growth, maturity, and
        eventual sunset — ensuring products remain viable, profitable, and aligned with
        market needs throughout their life.
      processes:
        - id: "493162"
          number: "2.6.1"
          name: "Plan and execute product launches and market entry"
          agentic_profile: "H+a"
          agentic_note: "Humans lead launch strategy; agents coordinate checklists and readiness tracking"
        - id: "825347"
          number: "2.6.2"
          name: "Monitor product performance and market reception"
          agentic_profile: A
          agentic_note: "Agent-executed; continuous monitoring of adoption, usage, and revenue metrics"
        - id: "567814"
          number: "2.6.3"
          name: "Manage product iterations, updates, and enhancements"
          agentic_profile: "H=A"
          agentic_note: "Agents prioritise backlog by data signals; humans approve release scope"
        - id: "314289"
          number: "2.6.4"
          name: "Plan and execute product retirement and sunsetting"
          agentic_profile: "H+a"
          agentic_note: "Humans decide retirement timing; agents manage migration and communication plans"
        - id: "682431"
          number: "2.6.5"
          name: "Manage regulatory and compliance aspects of the product lifecycle"
          agentic_profile: "H=A"
          agentic_note: "Agents track regulatory changes affecting products; humans ensure compliance"

    - id: "536182"
      number: "2.7"
      name: "Protect and Leverage Intellectual Property"
      description: >
        Identify, secure, manage, and commercially exploit the enterprise's intellectual
        property — including patents, trade secrets, trademarks, and proprietary know-how.
      processes:
        - id: "419237"
          number: "2.7.1"
          name: "Identify and assess intellectual property arising from products"
          agentic_profile: "H=A"
          agentic_note: "Agents scan codebases and designs for patentable elements; humans evaluate"
        - id: "783164"
          number: "2.7.2"
          name: "File and manage patent and trademark applications"
          agentic_profile: "h+A"
          agentic_note: "Agents draft initial filings and manage deadlines; humans review and approve"
        - id: "295841"
          number: "2.7.3"
          name: "Maintain the IP portfolio and renewal schedule"
          agentic_profile: A
          agentic_note: "Agent-executed; automated tracking and renewal management with human exception handling"
        - id: "641823"
          number: "2.7.4"
          name: "Monitor for IP infringement and competitive filings"
          agentic_profile: A
          agentic_note: "Agent-executed; continuous scanning of patent databases and market activity"
        - id: "518472"
          number: "2.7.5"
          name: "Manage IP licensing and commercialisation"
          agentic_profile: "H+a"
          agentic_note: "Humans negotiate terms; agents model licensing revenue and track agreements"

    - id: "927341"
      number: "2.8"
      name: "Generate Product Insights and Analytics"
      description: >
        Establish and operate the data, analytics, and insight capabilities that inform
        product decisions — from usage analytics and A/B testing through to predictive
        modelling and competitive intelligence.
      processes:
        - id: "364218"
          number: "2.8.1"
          name: "Define product metrics, KPIs, and measurement frameworks"
          agentic_profile: "H+a"
          agentic_note: "Humans define what to measure; agents recommend based on benchmarks"
        - id: "581749"
          number: "2.8.2"
          name: "Collect and integrate product usage and behavioural data"
          agentic_profile: A
          agentic_note: "Agent-executed; automated data pipeline management"
        - id: "729463"
          number: "2.8.3"
          name: "Conduct A/B testing and controlled experimentation"
          agentic_profile: "h+A"
          agentic_note: "Agents design, execute, and analyse experiments; humans set hypotheses"
        - id: "413892"
          number: "2.8.4"
          name: "Generate predictive models for product performance"
          agentic_profile: "h+A"
          agentic_note: "Agents build and maintain models; humans interpret and act on predictions"
        - id: "846527"
          number: "2.8.5"
          name: "Deliver product insight reports and recommendations"
          agentic_profile: "h+A"
          agentic_note: "Agents generate narrative reports; humans validate and distribute"
        - id: "152843"
          number: "2.8.6"
          name: "Monitor competitive product landscape and feature parity"
          agentic_profile: "h+A"
          agentic_note: "Agents track competitor releases and features; humans assess strategic implications"
