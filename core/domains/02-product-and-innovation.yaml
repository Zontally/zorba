              direction: lower_is_better
        - id: "872413"
          number: "2.5.3"
          name: "Execute research programmes and technical investigations"
          agentic_profile: "H+a"
          agentic_note: "Humans conduct research; agents assist with literature review and data analysis"
          measurements:
            - id: "022601"
              number: "2.5.3.M1"
              name: "Research Milestone Adherence"
              what: "Percentage of milestones achieved on schedule"
              why: "Missed milestones delay readiness"
              how: "Milestones on time / Total milestones × 100"
              frequency: quarterly
