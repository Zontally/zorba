domain:
  id: "738201"
  number: 1
  name: "Strategy & Governance"
  subtitle: "Setting direction and ensuring accountability"
  classification: management_function
  description: >
    This domain encompasses the enterprise's ability to define its purpose, set strategic
    direction, govern its operations, manage enterprise-wide performance, and ensure the
    organisation adapts and transforms to remain competitive. It is the domain where
    long-term intent is formulated, corporate accountability is established, and
    enterprise-wide coordination is orchestrated.

    In a ZORBA-enabled enterprise, this domain also governs how the blended workforce
    itself is designed and overseen — ensuring that the human/agent operating model is a
    deliberate strategic choice, not an emergent accident.

  capabilities:
    - id: "284713"
      number: "1.1"
      name: "Define the Business Concept and Long-Term Vision"
      description: >
        Establish the foundational purpose, mission, values, and long-term vision of
        the enterprise. This capability ensures the organisation has a clearly articulated
        reason for existing and a compelling picture of its future state.
      processes:
        - id: "517342"
          number: "1.1.1"
          name: "Develop and articulate the enterprise mission and purpose"
          agentic_profile: H
          agentic_note: "Human-led; agents may research peer missions for benchmarking"
          measurements:
            - id: "010101"
              number: "1.1.1.M1"
              name: "Mission Clarity Score"
              what: "Employee understanding and alignment with enterprise mission"
              why: "Unclear mission leads to strategic drift"
              how: "Annual survey score (1-10) on mission comprehension"
              frequency: annually
              direction: higher_is_better
            - id: "010102"
              number: "1.1.1.M2"
              name: "Mission Review Cycle Adherence"
              what: "Whether mission review occurs within planned cadence"
              why: "Ensures mission stays relevant as markets evolve"
              how: "Binary (1=on schedule, 0=overdue) tracked quarterly"
              frequency: quarterly
              direction: higher_is_better
        - id: "842156"
          number: "1.1.2"
          name: "Define and codify organisational values and principles"
          agentic_profile: H
          agentic_note: "Human-led; values require authentic human deliberation"
          measurements:
            - id: "010201"
              number: "1.1.2.M1"
              name: "Values Awareness Rate"
              what: "Percentage of employees who can articulate core values"
              why: "Values only drive behaviour when known and understood"
              how: "Survey respondents correctly identifying values / Total respondents × 100"
              frequency: annually
              direction: higher_is_better
            - id: "010202"
              number: "1.1.2.M2"
              name: "Values-Behaviour Alignment Score"
              what: "Degree to which observed behaviours reflect stated values"
              why: "Gap between stated and lived values erodes culture"
              how: "360-degree assessment average score on values alignment (1-10)"
              frequency: annually
              direction: higher_is_better
        - id: "394028"
          number: "1.1.3"
          name: "Formulate the long-term vision and strategic ambition"
          agentic_profile: "H+a"
          agentic_note: "Human-led with agent scenario modelling and trend analysis"
          measurements:
            - id: "010301"
              number: "1.1.3.M1"
              name: "Vision Refresh Timeliness"
              what: "Whether vision is reviewed and refreshed on schedule"
              why: "Stale vision leads to strategic misalignment"
              how: "Days since last vision review vs planned review cycle (variance in days)"
              frequency: annually
              direction: lower_is_better
            - id: "010302"
              number: "1.1.3.M2"
              name: "Strategic Ambition Stretch Ratio"
              what: "Ratio of vision targets to current performance baseline"
              why: "Ensures vision is aspirational enough to drive transformation"
              how: "Vision target metric / Current baseline metric"
              frequency: annually
              direction: higher_is_better
        - id: "651873"
          number: "1.1.4"
          name: "Communicate vision and purpose across the enterprise"
          agentic_profile: "H=A"
          agentic_note: "Agents generate communications; humans approve and personalise"
          measurements:
            - id: "010401"
              number: "1.1.4.M1"
              name: "Vision Communication Reach"
              what: "Percentage of workforce who received vision communications"
              why: "Vision only drives alignment when broadly communicated"
              how: "Employees reached / Total headcount × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "010402"
              number: "1.1.4.M2"
              name: "Vision Comprehension Rate"
              what: "Percentage of employees who can articulate the strategic vision"
              why: "Receiving communications does not guarantee understanding"
              how: "Pulse survey correct responses / Total respondents × 100"
              frequency: annually
              direction: higher_is_better
        - id: "923467"
          number: "1.1.5"
          name: "Review and refresh the business concept periodically"
          agentic_profile: "H+a"
          agentic_note: "Agents monitor market shifts and trigger review cycles"
          measurements:
            - id: "010501"
              number: "1.1.5.M1"
              name: "Business Concept Review Rate"
              what: "Whether periodic reviews are completed on schedule"
              why: "Ensures the business concept remains relevant"
              how: "Reviews completed on time / Reviews scheduled × 100"
              frequency: annually
              direction: higher_is_better
            - id: "010502"
              number: "1.1.5.M2"
              name: "Market Signal Response Time"
              what: "Days between significant market shift and triggered review"
              why: "Slow response risks competitive disadvantage"
              how: "Review trigger date − market event date (calendar days)"
              frequency: quarterly
              direction: lower_is_better

    - id: "156489"
      number: "1.2"
      name: "Develop and Manage Enterprise Strategy"
      description: >
        Translate the long-term vision into a coherent strategic plan that defines where
        the enterprise will compete, how it will win, and what capabilities it requires.
        This includes environmental analysis, strategic option evaluation, and strategy
        documentation.
      processes:
        - id: "308741"
          number: "1.2.1"
          name: "Conduct environmental and market analysis"
          agentic_profile: "h+A"
          agentic_note: "Agent-heavy; agents scan, synthesise, and present; humans interpret"
          measurements:
            - id: "010601"
              number: "1.2.1.M1"
              name: "Environmental Scan Coverage"
              what: "Number of external domains systematically analysed"
              why: "Blind spots lead to strategic surprises"
              how: "Domains covered (PESTLE) / 6 × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "010602"
              number: "1.2.1.M2"
              name: "Insight Freshness"
              what: "Age of the most recent market analysis deliverable"
              why: "Stale analysis leads to outdated decisions"
              how: "Current date − latest analysis date (calendar days)"
              frequency: monthly
              direction: lower_is_better
        - id: "762514"
          number: "1.2.2"
          name: "Assess internal capabilities and strategic readiness"
          agentic_profile: "H=A"
          agentic_note: "Agents map capabilities and gaps; humans validate and prioritise"
          measurements:
            - id: "010701"
              number: "1.2.2.M1"
              name: "Capability Gap Identification Rate"
              what: "Percentage of strategic capabilities assessed for readiness"
              why: "Unidentified gaps delay strategy execution"
              how: "Capabilities assessed / Total strategic capabilities × 100"
              frequency: annually
              direction: higher_is_better
            - id: "010702"
              number: "1.2.2.M2"
              name: "Readiness Assessment Cycle Time"
              what: "Days to complete a capability readiness assessment"
              why: "Faster assessments enable responsive planning"
              how: "Assessment completion date − start date (business days)"
              frequency: annually
              direction: lower_is_better
        - id: "439286"
          number: "1.2.3"
          name: "Identify and evaluate strategic options"
          agentic_profile: "H+a"
          agentic_note: "Agents model scenarios and outcomes; humans judge and decide"
          measurements:
            - id: "010801"
              number: "1.2.3.M1"
              name: "Strategic Options Evaluated"
              what: "Number of distinct strategic options formally evaluated"
              why: "Too few options increases risk of suboptimal strategy"
              how: "Count of formally evaluated strategic options per cycle"
              frequency: annually
              direction: higher_is_better
            - id: "010802"
              number: "1.2.3.M2"
              name: "Scenario Model Accuracy"
              what: "Variance between scenario projections and actual outcomes"
              why: "Accurate models improve decision confidence"
              how: "|Projected − Actual| / Actual × 100"
              frequency: annually
              direction: lower_is_better
        - id: "185673"
          number: "1.2.4"
          name: "Select and commit to strategic direction"
          agentic_profile: H
          agentic_note: "Human decision; agents provide decision-support artefacts"
          measurements:
            - id: "010901"
              number: "1.2.4.M1"
              name: "Strategic Decision Cycle Time"
              what: "Days from option presentation to formal commitment"
              why: "Delayed decisions create uncertainty"
              how: "Commitment date − options presentation date (calendar days)"
              frequency: annually
              direction: lower_is_better
            - id: "010902"
              number: "1.2.4.M2"
              name: "Stakeholder Alignment Score"
              what: "Degree of leadership alignment on chosen direction"
              why: "Misalignment cascades into execution dysfunction"
              how: "Leadership survey agreement score (1-10)"
              frequency: annually
              direction: higher_is_better
        - id: "624831"
          number: "1.2.5"
          name: "Document and formalise the strategic plan"
          agentic_profile: "h+A"
          agentic_note: "Agents draft; humans review, refine, and approve"
          measurements:
            - id: "011001"
              number: "1.2.5.M1"
              name: "Strategic Plan Completion Rate"
              what: "Percentage of strategic plan sections fully documented"
              why: "Incomplete plans lead to ambiguous execution"
              how: "Completed sections / Required sections × 100"
              frequency: annually
              direction: higher_is_better
            - id: "011002"
              number: "1.2.5.M2"
              name: "Plan Formalisation Cycle Time"
              what: "Days from strategic decision to approved plan"
              why: "Delays slow cascade and execution start"
              how: "Plan approval date − decision date (business days)"
              frequency: annually
              direction: lower_is_better
        - id: "571948"
          number: "1.2.6"
          name: "Cascade strategy across organisational units and domains"
          agentic_profile: "H=A"
          agentic_note: "Agents distribute and track acknowledgement; humans contextualise for their teams"
          measurements:
            - id: "011101"
              number: "1.2.6.M1"
              name: "Strategy Cascade Completion"
              what: "Percentage of OUs with localised strategic plans"
              why: "Uncascaded strategy remains executive abstraction"
              how: "OUs with localised plans / Total OUs × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "011102"
              number: "1.2.6.M2"
              name: "Cascade Acknowledgement Rate"
              what: "Percentage of leaders confirming understanding"
              why: "Acknowledgement is minimum bar for cascade effectiveness"
              how: "Leaders confirming / Total unit leaders × 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "893215"
          number: "1.2.7"
          name: "Monitor strategic assumptions and trigger strategy refresh"
          agentic_profile: A
          agentic_note: "Agents continuously monitor assumptions; alert humans when conditions change"
          measurements:
            - id: "011201"
              number: "1.2.7.M1"
              name: "Assumption Monitoring Coverage"
              what: "Percentage of assumptions with active monitoring"
              why: "Unmonitored assumptions become invisible risks"
              how: "Assumptions monitored / Total assumptions × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "011202"
              number: "1.2.7.M2"
              name: "Assumption Breach Alert Latency"
              what: "Time between breach and alert to leadership"
              why: "Faster alerts enable faster strategic response"
              how: "Alert timestamp − breach detection timestamp (hours)"
              frequency: quarterly
              direction: lower_is_better

    - id: "472053"
      number: "1.3"
      name: "Manage Strategic Planning Cycles and Cadences"
      description: >
        Define and operate the rhythms through which strategy is planned, reviewed, and
        refreshed — including annual planning cycles, quarterly reviews, and event-driven
        strategic responses.
      processes:
        - id: "341679"
          number: "1.3.1"
          name: "Define the strategic planning calendar and milestones"
          agentic_profile: "H+a"
          agentic_note: "Humans set cadences; agents schedule and track"
          measurements:
            - id: "011301"
              number: "1.3.1.M1"
              name: "Planning Calendar Adherence"
              what: "Percentage of milestones completed on schedule"
              why: "Missed milestones cascade delays"
              how: "Milestones on time / Total milestones × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "011302"
              number: "1.3.1.M2"
              name: "Planning Cycle Duration"
              what: "Total elapsed days for annual planning cycle"
              why: "Long cycles reduce agility"
              how: "Cycle end date − start date (calendar days)"
              frequency: annually
              direction: lower_is_better
        - id: "728463"
          number: "1.3.2"
          name: "Coordinate cross-functional input to strategic planning"
          agentic_profile: "H=A"
          agentic_note: "Agents orchestrate collection; humans contribute substance"
          measurements:
            - id: "011401"
              number: "1.3.2.M1"
              name: "Cross-Functional Input Rate"
              what: "Percentage of functions providing input on time"
              why: "Missing inputs create planning blind spots"
              how: "Functions on time / Functions requested × 100"
              frequency: annually
              direction: higher_is_better
            - id: "011402"
              number: "1.3.2.M2"
              name: "Input Quality Score"
              what: "Average quality rating of cross-functional contributions"
              why: "Low-quality inputs degrade plan quality"
              how: "Average quality rating from reviewers (1-10)"
              frequency: annually
              direction: higher_is_better
        - id: "514927"
          number: "1.3.3"
          name: "Facilitate strategic review sessions"
          agentic_profile: "H+a"
          agentic_note: "Agents prepare briefing packs; humans facilitate discussion"
          measurements:
            - id: "011501"
              number: "1.3.3.M1"
              name: "Review Session Completion Rate"
              what: "Percentage of scheduled reviews actually held"
              why: "Skipped reviews reduce oversight"
              how: "Reviews held / Reviews scheduled × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "011502"
              number: "1.3.3.M2"
              name: "Review Action Closure Rate"
              what: "Percentage of review actions completed by due date"
              why: "Open items undermine review effectiveness"
              how: "Actions closed on time / Total actions × 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "896234"
          number: "1.3.4"
          name: "Manage the transition from planning to execution"
          agentic_profile: "H=A"
          agentic_note: "Agents translate strategy into initiative structures; humans approve"
          measurements:
            - id: "011601"
              number: "1.3.4.M1"
              name: "Strategy-to-Initiative Rate"
              what: "Percentage of objectives linked to funded initiatives"
              why: "Untranslated strategies never reach execution"
              how: "Objectives with initiatives / Total objectives × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "011602"
              number: "1.3.4.M2"
              name: "Execution Readiness Score"
              what: "Average readiness of initiatives entering execution"
              why: "Poorly prepared initiatives fail during delivery"
              how: "Average readiness checklist score (0-100%)"
              frequency: quarterly
              direction: higher_is_better
        - id: "263148"
          number: "1.3.5"
          name: "Operate concurrent planning horizons"
          agentic_profile: "H=A"
          agentic_note: "Agents maintain multiple planning timelines; humans prioritise across horizons"
          measurements:
            - id: "011701"
              number: "1.3.5.M1"
              name: "Planning Horizon Coverage"
              what: "Number of concurrent planning horizons maintained"
              why: "Single-horizon planning misses long-term threats"
              how: "Count of actively maintained planning horizons"
              frequency: annually
              direction: higher_is_better
            - id: "011702"
              number: "1.3.5.M2"
              name: "Cross-Horizon Alignment Score"
              what: "Consistency across short, medium, and long-term plans"
              why: "Misaligned horizons create conflicting priorities"
              how: "Planning review assessment score (1-10)"
              frequency: annually
              direction: higher_is_better

    - id: "619372"
      number: "1.4"
      name: "Manage Corporate Governance and Board Operations"
      description: >
        Ensure the enterprise operates within its governance framework — including board
        management, fiduciary oversight, shareholder relations, and regulatory governance
        obligations.
      processes:
        - id: "485213"
          number: "1.4.1"
          name: "Manage board composition, meetings, and administration"
          agentic_profile: "h+A"
          agentic_note: "Agents handle scheduling, document prep, minutes; humans govern"
          measurements:
            - id: "011801"
              number: "1.4.1.M1"
              name: "Board Meeting Adherence"
              what: "Percentage of board meetings held on schedule"
              why: "Missed meetings impair governance oversight"
              how: "Meetings on schedule / Meetings planned × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "011802"
              number: "1.4.1.M2"
              name: "Board Pack Timeliness"
              what: "Days before meeting that packs are distributed"
              why: "Late distribution reduces preparation quality"
              how: "Meeting date − pack distribution date (calendar days)"
              frequency: quarterly
              direction: higher_is_better
        - id: "753648"
          number: "1.4.2"
          name: "Prepare and distribute board and committee packs"
          agentic_profile: "h+A"
          agentic_note: "Agent-assembled; humans review and approve content"
          measurements:
            - id: "011901"
              number: "1.4.2.M1"
              name: "Board Pack Completeness"
              what: "Percentage of required sections included"
              why: "Incomplete packs impair decision-making"
              how: "Sections included / Required sections × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "011902"
              number: "1.4.2.M2"
              name: "Pack Preparation Cycle Time"
              what: "Days to assemble and approve the board pack"
              why: "Shorter cycles allow more current information"
              how: "Approval date − assembly start date (business days)"
              frequency: quarterly
              direction: lower_is_better
        - id: "192837"
          number: "1.4.3"
          name: "Manage fiduciary and regulatory governance obligations"
          agentic_profile: "H+a"
          agentic_note: "Agents monitor compliance calendars; humans exercise fiduciary judgement"
          measurements:
            - id: "012001"
              number: "1.4.3.M1"
              name: "Governance Compliance Rate"
              what: "Percentage of obligations met on time"
              why: "Non-compliance creates legal and reputational risk"
              how: "Obligations met on time / Total obligations × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "012002"
              number: "1.4.3.M2"
              name: "Regulatory Filing Timeliness"
              what: "Average days before deadline that filings are submitted"
              why: "Cutting it close increases missed-deadline risk"
              how: "Average (deadline − submission date) across filings (days)"
              frequency: quarterly
              direction: higher_is_better
        - id: "647312"
          number: "1.4.4"
          name: "Coordinate shareholder and stakeholder communications"
          agentic_profile: "H=A"
          agentic_note: "Agents draft; humans approve tone and content"
          measurements:
            - id: "012101"
              number: "1.4.4.M1"
              name: "Stakeholder Comms Timeliness"
              what: "Percentage of communications delivered on schedule"
              why: "Late communications erode confidence"
              how: "Communications on time / Planned communications × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "012102"
              number: "1.4.4.M2"
              name: "Stakeholder Satisfaction Score"
              what: "Satisfaction with quality and transparency"
              why: "Low satisfaction signals trust gaps"
              how: "Average stakeholder survey score (1-10)"
              frequency: annually
              direction: higher_is_better
        - id: "831456"
          number: "1.4.5"
          name: "Maintain the corporate governance framework and policies"
          agentic_profile: "H=A"
          agentic_note: "Agents track regulatory changes and flag policy gaps; humans update policies"
          measurements:
            - id: "012201"
              number: "1.4.5.M1"
              name: "Policy Currency Rate"
              what: "Percentage of policies reviewed within cycle"
              why: "Outdated policies create compliance gaps"
              how: "Policies reviewed on schedule / Total policies × 100"
              frequency: annually
              direction: higher_is_better
            - id: "012202"
              number: "1.4.5.M2"
              name: "Policy Gap Closure Time"
              what: "Average days to close identified policy gaps"
              why: "Open gaps represent governance exposure"
              how: "Average gap closure date − identification date (calendar days)"
              frequency: quarterly
              direction: lower_is_better

    - id: "537182"
      number: "1.5"
      name: "Manage Enterprise Performance"
      description: >
        Establish and operate the enterprise performance management system — defining KPIs,
        tracking outcomes, conducting performance reviews, and ensuring accountability from
        strategy through to execution.
      processes:
        - id: "412965"
          number: "1.5.1"
          name: "Define enterprise KPIs and performance frameworks"
          agentic_profile: "H+a"
          agentic_note: "Humans define what matters; agents benchmark and recommend targets"
          measurements:
            - id: "012301"
              number: "1.5.1.M1"
              name: "KPI Definition Coverage"
              what: "Percentage of objectives with defined KPIs"
              why: "Unmeasured objectives cannot be managed"
              how: "Objectives with KPIs / Total objectives × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "012302"
              number: "1.5.1.M2"
              name: "KPI Target Setting Rate"
              what: "Percentage of KPIs with approved targets"
              why: "KPIs without targets provide data but not accountability"
              how: "KPIs with targets / Total KPIs × 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "869273"
          number: "1.5.2"
          name: "Collect, aggregate, and validate performance data"
          agentic_profile: A
          agentic_note: "Agent-executed; continuous automated data collection"
          measurements:
            - id: "012401"
              number: "1.5.2.M1"
              name: "Data Collection Automation Rate"
              what: "Percentage of KPIs with automated collection"
              why: "Manual collection is slow and error-prone"
              how: "KPIs with automated feeds / Total KPIs × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "012402"
              number: "1.5.2.M2"
              name: "Data Freshness"
              what: "Average lag between event and data availability"
              why: "Stale data delays decisions"
              how: "Average (data availability − event timestamp) in hours"
              frequency: monthly
              direction: lower_is_better
        - id: "234817"
          number: "1.5.3"
          name: "Analyse performance trends and identify variances"
          agentic_profile: "h+A"
          agentic_note: "Agents analyse and surface insights; humans interpret meaning"
          measurements:
            - id: "012501"
              number: "1.5.3.M1"
              name: "Variance Detection Rate"
              what: "Percentage of variances identified proactively"
              why: "Proactive detection enables faster correction"
              how: "Variances detected proactively / Total variances × 100"
              frequency: monthly
              direction: higher_is_better
            - id: "012502"
              number: "1.5.3.M2"
              name: "Trend Analysis Timeliness"
              what: "Days after period close that analysis is available"
              why: "Late analysis reduces actionability"
              how: "Analysis date − period close date (business days)"
              frequency: monthly
              direction: lower_is_better
        - id: "695148"
          number: "1.5.4"
          name: "Conduct periodic performance reviews"
          agentic_profile: "H+a"
          agentic_note: "Agents prepare review materials; humans lead review discussions"
          measurements:
            - id: "012601"
              number: "1.5.4.M1"
              name: "Review Cadence Adherence"
              what: "Percentage of reviews completed on time"
              why: "Skipped reviews reduce accountability"
              how: "Reviews on schedule / Reviews planned × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "012602"
              number: "1.5.4.M2"
              name: "Review Decision Cycle Time"
              what: "Days from review to documented decisions"
              why: "Slow follow-through undermines review value"
              how: "Decision date − review date (business days)"
              frequency: quarterly
              direction: lower_is_better
        - id: "748321"
          number: "1.5.5"
          name: "Manage corrective actions and performance interventions"
          agentic_profile: "H+a"
          agentic_note: "Humans decide interventions; agents track execution and follow-up"
          measurements:
            - id: "012701"
              number: "1.5.5.M1"
              name: "Corrective Action Completion"
              what: "Percentage of actions completed by target date"
              why: "Incomplete actions allow issues to persist"
              how: "Actions on time / Total corrective actions × 100"
              frequency: monthly
              direction: higher_is_better
            - id: "012702"
              number: "1.5.5.M2"
              name: "Intervention Effectiveness Rate"
              what: "Percentage of interventions achieving target improvement"
              why: "Ineffective interventions waste resources"
              how: "Interventions achieving target / Total interventions × 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "513429"
          number: "1.5.6"
          name: "Report performance to governance bodies and stakeholders"
          agentic_profile: "h+A"
          agentic_note: "Agents generate reports; humans present and contextualise"
          measurements:
            - id: "012801"
