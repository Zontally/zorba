domain:
  id: "329571"
  number: 11
  name: "Risk, Legal & Compliance"
  subtitle: "Governing trust in a human-agent enterprise"
  classification: management_function
  description: >
    This domain encompasses the enterprise's ability to identify, assess, and mitigate risk,
    provide legal counsel, ensure regulatory compliance, conduct independent assurance, and
    uphold ethical standards. It is the domain where organisational trust is built, protected,
    and demonstrated to regulators, customers, and the public.

    In a ZORBA-enabled enterprise, this domain bears a critical additional responsibility:
    governing the behaviour, compliance, and trustworthiness of AI agents — ensuring algorithmic
    decisions are explainable, auditable, and aligned with regulatory expectations and
    organisational values.

  capabilities:
    - id: "481327"
      number: "11.1"
      name: "Manage Enterprise Risk"
      description: >
        Identify, assess, treat, and monitor risks across the enterprise — maintaining the
        risk register, operating risk frameworks, and ensuring risks are owned, communicated,
        and actively managed.
      processes:
        - id: "724619"
          number: "11.1.1"
          name: "Maintain the enterprise risk framework and taxonomy"
          agentic_profile: "H+a"
          agentic_note: "Humans design the framework; agents maintain documentation and version control"
          measurements:
            - id: "110101"
              number: "11.1.1.M1"
              name: "Risk Framework Maturity Score"
              what: "Maturity level of the enterprise risk framework"
              why: "Higher maturity indicates more robust risk management"
              how: "Score from independent framework maturity assessment (1-5 scale)"
              frequency: annually
              direction: higher_is_better
            - id: "110102"
              number: "11.1.1.M2"
              name: "Risk Taxonomy Coverage"
              what: "Percentage of business domains covered by the risk taxonomy"
              why: "Gaps in taxonomy leave risks unidentified"
              how: "Domains with risk taxonomy mapping / Total domains x 100"
              frequency: annually
              direction: higher_is_better
        - id: "358241"
          number: "11.1.2"
          name: "Identify and register risks across domains and units"
          agentic_profile: "H=A"
          agentic_note: "Agents scan for emerging risks and prompt registration; humans validate and classify"
          measurements:
            - id: "110201"
              number: "11.1.2.M1"
              name: "Risk Register Completeness"
              what: "Percentage of identified risks with full register entries"
              why: "Incomplete entries prevent effective risk management"
              how: "Fully documented risks / Total identified risks x 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "110202"
              number: "11.1.2.M2"
              name: "Emerging Risk Identification Rate"
              what: "Number of new risks identified and registered per quarter"
              why: "Active identification prevents surprise risk events"
              how: "Count of newly registered risks per quarter"
              frequency: quarterly
              direction: higher_is_better
        - id: "916473"
          number: "11.1.3"
          name: "Assess and score risks by likelihood and impact"
          agentic_profile: "H=A"
          agentic_note: "Agents compute risk scores using agreed methodologies; humans exercise qualitative judgement"
          measurements:
            - id: "110301"
              number: "11.1.3.M1"
              name: "Risk Assessment Timeliness"
              what: "Percentage of risks assessed within the scheduled review cycle"
              why: "Overdue assessments leave risk scores stale and unreliable"
              how: "Risks assessed on schedule / Total risks due for assessment x 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "110302"
              number: "11.1.3.M2"
              name: "Risk Score Calibration Accuracy"
              what: "Correlation between predicted risk scores and actual loss events"
              why: "Accurate scoring validates the methodology and builds credibility"
              how: "Correlation coefficient between risk scores and realised losses"
              frequency: annually
              direction: higher_is_better
        - id: "542168"
          number: "11.1.4"
          name: "Define and track risk treatment plans"
          agentic_profile: "H+a"
          agentic_note: "Humans design treatments; agents track implementation and flag overdue actions"
          measurements:
            - id: "110401"
              number: "11.1.4.M1"
              name: "Risk Treatment Plan Completion Rate"
              what: "Percentage of risk treatment actions completed on schedule"
              why: "Delayed treatments leave the enterprise exposed to known risks"
              how: "Actions completed on time / Total planned actions x 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "110402"
              number: "11.1.4.M2"
              name: "Residual Risk Reduction"
              what: "Percentage reduction in residual risk scores after treatment"
              why: "Validates that treatments are effective in reducing risk"
              how: "(Pre-treatment score - Post-treatment score) / Pre-treatment score x 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "273894"
          number: "11.1.5"
          name: "Monitor the risk landscape and produce risk reports"
          agentic_profile: "h+A"
          agentic_note: "Agents monitor continuously and generate risk dashboards; humans interpret for leadership"
          measurements:
            - id: "110501"
              number: "11.1.5.M1"
              name: "Risk Report Timeliness"
              what: "Percentage of risk reports delivered to leadership on schedule"
              why: "Late reports delay risk-informed decision-making"
              how: "On-time reports / Total scheduled reports x 100"
              frequency: monthly
              direction: higher_is_better
            - id: "110502"
              number: "11.1.5.M2"
              name: "Risk Dashboard Accuracy"
              what: "Percentage of dashboard data points validated as accurate"
              why: "Inaccurate dashboards undermine confidence in risk reporting"
              how: "Accurate data points / Total data points audited x 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "685312"
          number: "11.1.6"
          name: "Conduct risk scenario analysis and stress testing"
          agentic_profile: "H=A"
          agentic_note: "Agents run simulations and model scenarios; humans define parameters and interpret results"
          measurements:
            - id: "110601"
              number: "11.1.6.M1"
              name: "Stress Test Scenario Coverage"
              what: "Number of distinct risk scenarios tested per cycle"
              why: "Broader coverage improves preparedness for diverse risk events"
              how: "Count of distinct scenarios tested"
              frequency: annually
              direction: higher_is_better
            - id: "110602"
              number: "11.1.6.M2"
              name: "Scenario Analysis Actionability"
              what: "Percentage of stress test findings with documented response plans"
              why: "Findings without action plans provide no defensive value"
              how: "Findings with response plans / Total findings x 100"
              frequency: annually
              direction: higher_is_better

    - id: "817432"
      number: "11.2"
      name: "Provide Legal Services and Manage Contracts"
      description: >
        Deliver legal counsel to the enterprise, manage the contract lifecycle, handle disputes
        and litigation, and ensure the organisation's legal interests are protected.
      processes:
        - id: "439256"
          number: "11.2.1"
          name: "Provide legal advice and counsel to business units"
          agentic_profile: H
          agentic_note: "Human-led; legal judgement requires qualified human practitioners"
          measurements:
            - id: "110701"
              number: "11.2.1.M1"
              name: "Legal Advice Turnaround Time"
              what: "Average days to deliver legal advice from request"
              why: "Delayed advice slows business decisions and deal execution"
              how: "Average business days from request to advice delivered"
              frequency: monthly
              direction: lower_is_better
            - id: "110702"
              number: "11.2.1.M2"
              name: "Legal Advice Satisfaction Score"
              what: "Business unit satisfaction with legal advisory services"
              why: "Low satisfaction indicates disconnect between legal and business needs"
              how: "Average rating from internal client satisfaction survey (1-5 scale)"
              frequency: quarterly
              direction: higher_is_better
        - id: "763148"
          number: "11.2.2"
          name: "Draft, review, and negotiate contracts"
          agentic_profile: "H+a"
          agentic_note: "Humans lead negotiation and review; agents draft from templates and flag non-standard clauses"
          measurements:
            - id: "110801"
              number: "11.2.2.M1"
              name: "Contract Cycle Time"
              what: "Average days from contract initiation to execution"
              why: "Long cycle times delay revenue and partnerships"
              how: "Average calendar days from draft initiation to signed contract"
              frequency: monthly
              direction: lower_is_better
            - id: "110802"
              number: "11.2.2.M2"
              name: "Non-Standard Clause Rate"
              what: "Percentage of contracts containing non-standard clauses"
              why: "Non-standard clauses increase risk and review burden"
              how: "Contracts with non-standard clauses / Total contracts x 100"
              frequency: quarterly
              direction: lower_is_better
        - id: "291875"
          number: "11.2.3"
          name: "Manage the contract lifecycle and obligations tracking"
          agentic_profile: "h+A"
          agentic_note: "Agents track milestones, renewals, and obligations; humans handle exceptions and renegotiations"
          measurements:
            - id: "110901"
              number: "11.2.3.M1"
              name: "Contract Obligation Compliance Rate"
              what: "Percentage of contract obligations met on time"
              why: "Missed obligations create legal liability and relationship damage"
              how: "Obligations met on time / Total obligations due x 100"
              frequency: monthly
              direction: higher_is_better
            - id: "110902"
              number: "11.2.3.M2"
              name: "Contract Renewal Timeliness"
              what: "Percentage of contracts renewed or renegotiated before expiry"
              why: "Lapsed contracts create service and legal continuity gaps"
              how: "Timely renewals / Total contracts due for renewal x 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "648312"
          number: "11.2.4"
          name: "Manage disputes, litigation, and regulatory proceedings"
          agentic_profile: H
          agentic_note: "Human-led; agents manage case files, deadlines, and document assembly"
          measurements:
            - id: "111001"
              number: "11.2.4.M1"
              name: "Litigation Spend vs Budget"
              what: "Actual litigation spend as percentage of budget"
              why: "Uncontrolled litigation costs impact financial performance"
              how: "Actual litigation spend / Budget x 100"
              frequency: quarterly
              direction: lower_is_better
            - id: "111002"
              number: "11.2.4.M2"
              name: "Dispute Resolution Rate"
              what: "Percentage of disputes resolved without proceeding to trial"
              why: "Pre-trial resolution saves cost and reduces risk exposure"
              how: "Disputes resolved pre-trial / Total disputes x 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "527493"
          number: "11.2.5"
          name: "Maintain the legal entity structure and corporate records"
          agentic_profile: "h+A"
          agentic_note: "Agents maintain records and filing calendars; humans authorise structural changes"
          measurements:
            - id: "111101"
              number: "11.2.5.M1"
              name: "Corporate Filing Timeliness"
              what: "Percentage of statutory corporate filings submitted on time"
              why: "Late filings result in penalties and regulatory scrutiny"
              how: "On-time filings / Total required filings x 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "111102"
              number: "11.2.5.M2"
              name: "Entity Records Accuracy"
              what: "Percentage of legal entity records verified as accurate"
              why: "Inaccurate records create compliance and transaction risks"
              how: "Verified accurate records / Total entity records x 100"
              frequency: annually
              direction: higher_is_better
        - id: "184736"
          number: "11.2.6"
          name: "Manage intellectual property and brand protection"
          agentic_profile: "H+a"
          agentic_note: "Humans make IP strategy decisions; agents monitor infringement and manage filings"
          measurements:
            - id: "111201"
              number: "11.2.6.M1"
              name: "IP Portfolio Coverage"
              what: "Percentage of key innovations with intellectual property protection"
              why: "Unprotected innovations are vulnerable to competitor appropriation"
              how: "Protected innovations / Total key innovations x 100"
              frequency: annually
              direction: higher_is_better
            - id: "111202"
              number: "11.2.6.M2"
              name: "IP Infringement Detection Rate"
              what: "Number of potential IP infringements detected and actioned"
              why: "Active monitoring protects brand and competitive position"
              how: "Count of infringements detected and actioned per quarter"
              frequency: quarterly
              direction: higher_is_better

    - id: "265918"
      number: "11.3"
      name: "Ensure Regulatory Compliance"
      description: >
        Monitor the regulatory environment, interpret obligations, implement compliance
        programmes, and demonstrate adherence to all applicable laws, regulations, and
        industry standards.
      processes:
        - id: "834152"
          number: "11.3.1"
          name: "Monitor and interpret regulatory changes and obligations"
          agentic_profile: "h+A"
          agentic_note: "Agents scan regulatory feeds and summarise changes; humans assess applicability"
          measurements:
            - id: "111301"
              number: "11.3.1.M1"
              name: "Regulatory Change Processing Time"
              what: "Average days to assess and document impact of regulatory changes"
              why: "Slow processing risks non-compliance with new requirements"
              how: "Average days from regulatory change publication to impact assessment completion"
              frequency: monthly
              direction: lower_is_better
            - id: "111302"
              number: "11.3.1.M2"
              name: "Regulatory Scanning Coverage"
              what: "Percentage of applicable regulatory bodies actively monitored"
              why: "Gaps in monitoring create compliance blind spots"
              how: "Monitored regulatory bodies / Total applicable bodies x 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "496731"
          number: "11.3.2"
          name: "Design and implement compliance programmes"
          agentic_profile: "H+a"
          agentic_note: "Humans design programmes; agents operationalise controls and track adoption"
          measurements:
            - id: "111401"
              number: "11.3.2.M1"
              name: "Compliance Programme Coverage"
              what: "Percentage of regulatory obligations with implemented compliance controls"
              why: "Uncovered obligations leave the enterprise exposed"
              how: "Obligations with controls / Total obligations x 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "111402"
              number: "11.3.2.M2"
              name: "Compliance Control Effectiveness"
              what: "Percentage of compliance controls rated as effective in testing"
              why: "Ineffective controls provide false assurance"
              how: "Effective controls / Total controls tested x 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "713549"
          number: "11.3.3"
          name: "Conduct compliance assessments and testing"
          agentic_profile: "H=A"
          agentic_note: "Agents execute automated compliance checks; humans investigate exceptions"
          measurements:
            - id: "111501"
              number: "11.3.3.M1"
              name: "Compliance Assessment Completion Rate"
              what: "Percentage of scheduled compliance assessments completed on time"
              why: "Incomplete assessments leave compliance gaps undetected"
              how: "Completed assessments / Scheduled assessments x 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "111502"
              number: "11.3.3.M2"
              name: "Compliance Exception Rate"
              what: "Number of compliance exceptions identified per assessment"
              why: "Trending exceptions reveals systemic control weaknesses"
              how: "Average exceptions per assessment"
              frequency: quarterly
              direction: lower_is_better
        - id: "358274"
          number: "11.3.4"
          name: "Manage regulatory filings and submissions"
          agentic_profile: "h+A"
          agentic_note: "Agents prepare and submit filings; humans review and approve before submission"
          measurements:
            - id: "111601"
              number: "11.3.4.M1"
              name: "Regulatory Filing On-Time Rate"
              what: "Percentage of regulatory filings submitted before deadline"
              why: "Late filings trigger penalties and regulatory scrutiny"
              how: "On-time filings / Total filings x 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "111602"
              number: "11.3.4.M2"
              name: "Filing Accuracy Rate"
              what: "Percentage of filings accepted without amendment requests"
              why: "Amendments signal data quality or process issues"
              how: "Filings accepted first time / Total filings x 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "621483"
          number: "11.3.5"
          name: "Manage relationships with regulators and supervisory bodies"
          agentic_profile: H
          agentic_note: "Human-led; regulatory relationships require human diplomacy and judgement"
          measurements:
            - id: "111701"
              number: "11.3.5.M1"
              name: "Regulator Engagement Frequency"
              what: "Number of proactive regulatory engagement touchpoints per quarter"
              why: "Active engagement builds trust and early warning of changes"
              how: "Count of proactive regulator meetings and communications"
              frequency: quarterly
              direction: higher_is_better
            - id: "111702"
              number: "11.3.5.M2"
              name: "Regulatory Enquiry Response Time"
              what: "Average days to respond to regulatory enquiries"
              why: "Slow response damages regulatory relationships and trust"
              how: "Average business days from enquiry receipt to response"
              frequency: quarterly
              direction: lower_is_better

    - id: "742613"
      number: "11.4"
      name: "Conduct Internal Audit and Assurance"
      description: >
        Provide independent, objective assurance over the effectiveness of governance, risk
        management, and internal controls — operating with professional scepticism and
        organisational independence.
      processes:
        - id: "318947"
          number: "11.4.1"
          name: "Develop the risk-based internal audit plan"
          agentic_profile: "H+a"
          agentic_note: "Humans set audit priorities; agents analyse risk data to inform planning"
          measurements:
            - id: "111801"
              number: "11.4.1.M1"
              name: "Audit Plan Coverage"
              what: "Percentage of high-risk areas included in the annual audit plan"
              why: "Uncovered high-risk areas lack independent assurance"
              how: "High-risk areas in plan / Total high-risk areas x 100"
              frequency: annually
              direction: higher_is_better
            - id: "111802"
              number: "11.4.1.M2"
              name: "Audit Plan Completion Rate"
              what: "Percentage of planned audits completed within the year"
              why: "Incomplete plans leave assurance gaps"
              how: "Audits completed / Audits planned x 100"
              frequency: annually
              direction: higher_is_better
        - id: "856271"
          number: "11.4.2"
          name: "Execute audit engagements and fieldwork"
          agentic_profile: "H=A"
          agentic_note: "Agents perform data analytics and automated testing; humans conduct interviews and assess controls"
          measurements:
            - id: "111901"
              number: "11.4.2.M1"
              name: "Audit Engagement Cycle Time"
              what: "Average days from audit start to draft report"
              why: "Long cycle times delay remediation and reduce audit relevance"
              how: "Average days from fieldwork start to draft report issuance"
              frequency: quarterly
              direction: lower_is_better
            - id: "111902"
              number: "11.4.2.M2"
              name: "Audit Finding Acceptance Rate"
              what: "Percentage of audit findings accepted by management"
              why: "Low acceptance indicates quality or relevance issues in audit work"
              how: "Findings accepted / Total findings issued x 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "493128"
          number: "11.4.3"
          name: "Report audit findings and recommendations"
          agentic_profile: "H+a"
          agentic_note: "Humans form opinions and present findings; agents draft reports and track management responses"
          measurements:
            - id: "112001"
              number: "11.4.3.M1"
              name: "Report Issuance Timeliness"
              what: "Percentage of audit reports issued within target timeline"
              why: "Late reports delay management response and remediation"
              how: "Reports issued on time / Total reports x 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "112002"
              number: "11.4.3.M2"
              name: "High-Risk Finding Rate"
              what: "Percentage of findings rated high or critical severity"
              why: "Tracks the severity profile of audit outcomes"
              how: "High/critical findings / Total findings x 100"
              frequency: quarterly
              direction: lower_is_better
        - id: "627314"
          number: "11.4.4"
          name: "Monitor remediation of audit findings"
          agentic_profile: "h+A"
          agentic_note: "Agents track action completion and escalate overdue items; humans validate remediation quality"
          measurements:
            - id: "112101"
              number: "11.4.4.M1"
              name: "Audit Finding Remediation Rate"
              what: "Percentage of audit findings remediated within agreed timelines"
              why: "Overdue findings represent unmitigated risk"
              how: "Findings remediated on time / Total findings due x 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "112102"
              number: "11.4.4.M2"
              name: "Overdue Finding Ageing"
              what: "Average age of overdue audit findings in days"
              why: "Ageing findings indicate systemic remediation failures"
              how: "Average days overdue for all open overdue findings"
              frequency: monthly
              direction: lower_is_better
        - id: "185439"
          number: "11.4.5"
          name: "Assess internal audit effectiveness and independence"
          agentic_profile: H
          agentic_note: "Human-led; independence assessment requires human objectivity"
          measurements:
            - id: "112201"
              number: "11.4.5.M1"
              name: "Audit Independence Score"
              what: "Results of periodic independence assessment"
              why: "Independence is the foundation of audit credibility"
              how: "Score from independence self-assessment framework (1-5 scale)"
              frequency: annually
              direction: higher_is_better
            - id: "112202"
              number: "11.4.5.M2"
              name: "Stakeholder Satisfaction with Audit"
              what: "Average satisfaction rating from audit committee and management"
              why: "Low satisfaction indicates audit function needs improvement"
              how: "Average rating from annual stakeholder survey (1-5 scale)"
              frequency: annually
              direction: higher_is_better

    - id: "593148"
      number: "11.5"
      name: "Protect Data Privacy and Personal Information"
      description: >
        Ensure the enterprise collects, processes, stores, and shares personal data lawfully,
        transparently, and securely — meeting the requirements of privacy regulations and
        respecting individual rights.
      processes:
        - id: "905427"
          number: "11.5.1"
          name: "Maintain the data privacy framework and policies"
          agentic_profile: "H+a"
          agentic_note: "Humans set privacy policy; agents track regulatory changes and flag required updates"
          measurements:
            - id: "112301"
              number: "11.5.1.M1"
              name: "Privacy Policy Currency"
              what: "Percentage of privacy policies reviewed within scheduled cycle"
              why: "Outdated policies may not reflect current regulations"
              how: "Policies reviewed on schedule / Total privacy policies x 100"
              frequency: annually
              direction: higher_is_better
            - id: "112302"
              number: "11.5.1.M2"
              name: "Privacy Framework Maturity Score"
              what: "Maturity level of the data privacy programme"
              why: "Higher maturity reduces risk of privacy breaches and fines"
              how: "Score from privacy maturity assessment (1-5 scale)"
              frequency: annually
              direction: higher_is_better
        - id: "816542"
          number: "11.5.2"
          name: "Conduct data protection impact assessments"
          agentic_profile: "H=A"
          agentic_note: "Agents perform automated data mapping and initial assessments; humans evaluate high-risk processing"
          measurements:
            - id: "112401"
              number: "11.5.2.M1"
              name: "DPIA Completion Rate"
              what: "Percentage of high-risk processing activities with completed DPIAs"
              why: "Missing DPIAs create regulatory non-compliance risk"
              how: "Completed DPIAs / Required DPIAs x 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "112402"
              number: "11.5.2.M2"
              name: "DPIA Cycle Time"
              what: "Average days to complete a data protection impact assessment"
              why: "Lengthy assessments delay new data processing initiatives"
              how: "Average days from DPIA initiation to completion"
              frequency: quarterly
              direction: lower_is_better
        - id: "439617"
          number: "11.5.3"
          name: "Manage data subject rights requests"
          agentic_profile: "h+A"
          agentic_note: "Agents process requests, locate data, and prepare responses; humans approve complex cases"
          measurements:
            - id: "112501"
              number: "11.5.3.M1"
              name: "Data Subject Request Response Time"
              what: "Average days to fulfil data subject rights requests"
              why: "Regulatory deadlines for DSR fulfilment are strict"
              how: "Average days from request receipt to fulfilment"
              frequency: monthly
              direction: lower_is_better
            - id: "112502"
              number: "11.5.3.M2"
              name: "DSR Compliance Rate"
              what: "Percentage of data subject requests fulfilled within regulatory deadline"
              why: "Missed deadlines trigger regulatory penalties"
              how: "Requests fulfilled within deadline / Total requests x 100"
              frequency: monthly
              direction: higher_is_better
        - id: "758243"
          number: "11.5.4"
          name: "Monitor data processing activities for compliance"
          agentic_profile: A
          agentic_note: "Agent-executed; continuous monitoring of data flows against consent and purpose records"
          measurements:
            - id: "112601"
              number: "11.5.4.M1"
              name: "Processing Activity Monitoring Coverage"
              what: "Percentage of data processing activities under continuous monitoring"
              why: "Unmonitored processing may violate consent or purpose limitations"
              how: "Monitored activities / Total registered activities x 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "112602"
              number: "11.5.4.M2"
              name: "Privacy Violation Detection Rate"
              what: "Number of potential privacy violations detected per quarter"
              why: "Active detection prevents minor issues becoming reportable breaches"
              how: "Count of detected potential violations"
              frequency: quarterly
              direction: higher_is_better
        - id: "361829"
          number: "11.5.5"
          name: "Manage data breach notification and response"
          agentic_profile: "H+a"
          agentic_note: "Humans lead response and notification decisions; agents detect breaches and manage timelines"
          measurements:
            - id: "112701"
              number: "11.5.5.M1"
              name: "Breach Notification Timeliness"
              what: "Percentage of reportable breaches notified within regulatory deadline"
              why: "Late notification triggers additional penalties and regulatory scrutiny"
