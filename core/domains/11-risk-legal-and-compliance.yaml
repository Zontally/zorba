    - id: "196482"
      number: "11.7"
      name: "Govern AI Agents and Ensure Algorithmic Compliance"
      description: >
        ZORBA-specific capability. Establish and operate the governance framework for AI
        agents — ensuring their decisions are explainable, their behaviour is auditable,
        their outputs are fair, and their operation complies with emerging AI regulations
        and organisational policies.
      processes:
        - id: "853217"
          number: "11.7.1"
          name: "Define and maintain the AI governance framework and policies"
          agentic_profile: "H+a"
          agentic_note: "Humans set governance principles; agents maintain the policy repository and version history"
          measurements:
            - id: "113301"
              number: "11.7.1.M1"
              name: "AI Governance Framework Coverage"
              what: "Percentage of deployed agents governed under the AI framework"
              why: "Ungoverned agents create unmanaged risk"
              how: "Agents under governance framework / Total deployed agents x 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "113302"
              number: "11.7.1.M2"
              name: "AI Policy Currency"
              what: "Percentage of AI governance policies reviewed within cycle"
              why: "Rapidly evolving AI landscape requires current policies"
              how: "Policies reviewed on schedule / Total AI policies x 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "472831"
          number: "11.7.2"
          name: "Conduct algorithmic impact assessments before deployment"
          agentic_profile: "H=A"
          agentic_note: "Agents run bias testing and impact simulations; humans evaluate results and approve deployment"
          measurements:
            - id: "113401"
              number: "11.7.2.M1"
              name: "Algorithmic Impact Assessment Completion"
              what: "Percentage of high-risk agents with completed impact assessments"
              why: "Unassessed high-risk agents may cause harm or non-compliance"
              how: "Agents with completed assessments / Total high-risk agents x 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "113402"
              number: "11.7.2.M2"
              name: "Assessment-to-Deployment Gate Time"
              what: "Average days from assessment completion to deployment approval"
              why: "Efficient gating enables faster agent deployment without skipping controls"
              how: "Average days from assessment completion to approval"
              frequency: quarterly
              direction: lower_is_better
        - id: "618943"
          number: "11.7.3"
          name: "Monitor agent decisions for fairness, bias, and drift"
          agentic_profile: "h+A"
          agentic_note: "Agents continuously monitor decision patterns and flag anomalies; humans investigate and remediate"
          measurements:
            - id: "113501"
              number: "11.7.3.M1"
              name: "AI Fairness Score"
              what: "Composite fairness metric across monitored agent decisions"
              why: "Biased agent decisions create legal, reputational, and ethical risk"
              how: "Average fairness score across demographic groups (0-100 scale)"
              frequency: monthly
              direction: higher_is_better
            - id: "113502"
              number: "11.7.3.M2"
              name: "AI Decision Drift Alerts"
              what: "Number of decision pattern drift alerts triggered per month"
              why: "Drift may indicate model degradation or data quality issues"
              how: "Count of drift alerts triggered"
              frequency: monthly
              direction: lower_is_better
        - id: "345176"
          number: "11.7.4"
          name: "Maintain audit trails and explainability records for agent actions"
          agentic_profile: A
          agentic_note: "Agent-executed; automated logging and explainability record generation"
          measurements:
            - id: "113601"
              number: "11.7.4.M1"
              name: "Audit Trail Completeness"
              what: "Percentage of agent actions with complete audit trail records"
              why: "Incomplete trails prevent investigation and accountability"
              how: "Actions with complete audit trails / Total agent actions x 100"
              frequency: monthly
              direction: higher_is_better
            - id: "113602"
              number: "11.7.4.M2"
              name: "Explainability Record Availability"
              what: "Percentage of agent decisions with available explanations"
              why: "Explainability is required by regulation and builds stakeholder trust"
              how: "Decisions with explanations / Total decisions requiring explanation x 100"
              frequency: monthly
              direction: higher_is_better
        - id: "729368"
          number: "11.7.5"
          name: "Ensure compliance with AI-specific regulations and standards"
          agentic_profile: "H=A"
          agentic_note: "Agents track evolving AI regulation; humans interpret obligations and design compliance responses"
          measurements:
            - id: "113701"
              number: "11.7.5.M1"
              name: "AI Regulation Compliance Rate"
              what: "Percentage of applicable AI regulations with demonstrated compliance"
              why: "Non-compliance triggers enforcement actions and fines"
              how: "Regulations with demonstrated compliance / Total applicable regulations x 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "113702"
              number: "11.7.5.M2"
              name: "AI Regulatory Change Response Time"
              what: "Average days to assess and respond to new AI regulations"
              why: "Slow response risks non-compliance with new requirements"
              how: "Average days from regulation publication to compliance plan"
              frequency: quarterly
              direction: lower_is_better
        - id: "561294"
          number: "11.7.6"
          name: "Manage AI incident response and agent-related escalations"
          agentic_profile: "H+a"
          agentic_note: "Humans lead incident response; agents isolate affected agents and preserve evidence"
          measurements:
            - id: "113801"
              number: "11.7.6.M1"
              name: "AI Incident Response Time"
              what: "Average time from AI incident detection to containment"
              why: "Faster response limits harm from agent misbehaviour"
              how: "Average minutes from detection to containment"
              frequency: monthly
              direction: lower_is_better
            - id: "113802"
              number: "11.7.6.M2"
              name: "AI Incident Recurrence Rate"
              what: "Percentage of AI incidents that are repeat occurrences"
              why: "Recurring incidents indicate ineffective root cause remediation"
              how: "Repeat incidents / Total AI incidents x 100"
              frequency: quarterly
              direction: lower_is_better
        - id: "887507"
          number: "11.7.7"
          name: "Report on AI governance maturity and agent compliance posture"
          agentic_profile: "h+A"
          agentic_note: "Agents generate compliance dashboards; humans present to governance bodies and regulators"
          measurements:
            - id: "113901"
              number: "11.7.7.M1"
              name: "AI Governance Maturity Score"
              what: "Overall maturity of the AI governance programme"
              why: "Tracks progress in building robust AI governance capabilities"
              how: "Score from AI governance maturity assessment (1-5 scale)"
              frequency: annually
              direction: higher_is_better
            - id: "113902"
              number: "11.7.7.M2"
              name: "Agent Compliance Dashboard Accuracy"
              what: "Percentage of compliance dashboard metrics validated as accurate"
              why: "Inaccurate reporting undermines governance credibility"
              how: "Accurate metrics / Total dashboard metrics audited x 100"
              frequency: quarterly
              direction: higher_is_better
