        operational flow — restoring service, minimising impact, and capturing lessons
        for prevention.
      processes:
        - id: "175342"
          number: "6.7.1"
          name: "Detect and classify operational incidents and exceptions"
          agentic_profile: A
          agentic_note: "Agent-executed; real-time anomaly detection and classification"
          measurements:
            - id: "0633001"
              number: "6.7.1.M1"
              name: "Incident Detection Speed"
              what: "Average time from incident occurrence to detection"
              why: "Faster detection reduces impact scope"
              how: "Average (detection time − occurrence time) in minutes"
              frequency: weekly
              direction: lower_is_better
            - id: "0633002"
              number: "6.7.1.M2"
              name: "Incident Classification Accuracy"
              what: "Percentage of incidents correctly classified on first attempt"
              why: "Correct classification drives appropriate response"
              how: "Correctly classified / Total incidents × 100"
              frequency: monthly
              direction: higher_is_better
        - id: "428916"
          number: "6.7.2"
          name: "Triage and prioritise incident response"
          agentic_profile: "h+A"
          agentic_note: "Agents triage by severity; humans override for complex or sensitive incidents"
          measurements:
            - id: "0634001"
              number: "6.7.2.M1"
