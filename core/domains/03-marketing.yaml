domain:
  id: "729415"
  number: 3
  name: "Marketing"
  subtitle: "Building demand and shaping perception"
  classification: value_chain
  description: >
    This domain encompasses the enterprise's ability to understand its markets, build
    compelling brand narratives, generate demand, and attract qualified prospects. It spans
    the full marketing spectrum from strategic planning and brand stewardship through to
    campaign execution, content production, and performance measurement.

    In a ZORBA-enabled enterprise, marketing is where agentic scale meets human creativity
    — with agents producing content variations at unprecedented speed, optimising campaigns
    in real time, automating attribution analysis, and freeing marketers to focus on strategy,
    storytelling, and brand authenticity.

  capabilities:
    - id: "418362"
      number: "3.1"
      name: "Develop Marketing Strategy and Planning"
      description: >
        Define the marketing strategy, set objectives, allocate budgets, and establish the
        planning frameworks that guide all marketing activity. This capability ensures
        marketing investments are strategically aligned and measurably effective.
      processes:
        - id: "629471"
          number: "3.1.1"
          name: "Define marketing objectives and strategic priorities"
          agentic_profile: H
          agentic_note: "Human-led; marketing strategy requires market intuition and brand judgement"
        - id: "814253"
          number: "3.1.2"
          name: "Segment markets and identify target audiences"
          agentic_profile: "h+A"
          agentic_note: "Agents cluster data and model segments; humans validate and name segments"
        - id: "537184"
          number: "3.1.3"
          name: "Develop annual and campaign-level marketing plans"
          agentic_profile: "H+a"
          agentic_note: "Humans plan; agents model budget scenarios and channel mix"
        - id: "293647"
          number: "3.1.4"
          name: "Allocate and manage marketing budgets"
          agentic_profile: "H=A"
          agentic_note: "Agents optimise allocation models; humans approve and adjust"
        - id: "461928"
          number: "3.1.5"
          name: "Define positioning and messaging frameworks"
          agentic_profile: "H+a"
          agentic_note: "Humans craft positioning; agents test messaging variations"
        - id: "785312"
          number: "3.1.6"
          name: "Coordinate marketing calendar and cross-functional alignment"
          agentic_profile: "h+A"
          agentic_note: "Agents maintain calendars and flag conflicts; humans resolve priorities"

    - id: "562413"
      number: "3.2"
      name: "Steward the Brand and Communications"
      description: >
        Build, protect, and evolve the enterprise brand — ensuring consistency across all
        touchpoints, managing reputation, and orchestrating corporate and product
        communications.
      processes:
        - id: "348917"
          number: "3.2.1"
          name: "Define and maintain brand identity and guidelines"
          agentic_profile: H
          agentic_note: "Human-led; brand identity requires authentic creative vision"
        - id: "721563"
          number: "3.2.2"
          name: "Manage brand consistency across channels and touchpoints"
          agentic_profile: "h+A"
          agentic_note: "Agents audit brand compliance; humans address strategic deviations"
        - id: "495831"
          number: "3.2.3"
          name: "Plan and execute corporate communications"
          agentic_profile: "H=A"
          agentic_note: "Agents draft communications; humans approve tone and substance"
        - id: "163274"
          number: "3.2.4"
          name: "Manage public relations and media engagement"
          agentic_profile: "H+a"
          agentic_note: "Humans manage relationships; agents monitor media and prepare briefs"
        - id: "842196"
          number: "3.2.5"
          name: "Monitor and manage brand reputation and sentiment"
          agentic_profile: "h+A"
          agentic_note: "Agents continuously track sentiment; humans respond to critical issues"
        - id: "617428"
          number: "3.2.6"
          name: "Manage crisis communications and rapid response"
          agentic_profile: "H+a"
          agentic_note: "Humans lead crisis response; agents monitor situation and draft holding statements"

    - id: "384219"
      number: "3.3"
      name: "Generate Demand and Manage Lead Flow"
      description: >
        Attract, capture, nurture, and qualify prospective customers through integrated
        demand generation programmes. This capability ensures a healthy pipeline of
        marketing-qualified leads for the sales organisation.
      processes:
        - id: "529147"
          number: "3.3.1"
          name: "Design and execute demand generation campaigns"
          agentic_profile: "H=A"
          agentic_note: "Agents optimise targeting and bidding; humans set creative direction"
        - id: "748213"
          number: "3.3.2"
          name: "Capture and enrich lead data from multiple sources"
          agentic_profile: A
          agentic_note: "Agent-executed; automated capture, deduplication, and enrichment"
        - id: "391564"
          number: "3.3.3"
          name: "Score and qualify leads for sales readiness"
          agentic_profile: "h+A"
          agentic_note: "Agents score using behavioural and firmographic data; humans set thresholds"
        - id: "613842"
          number: "3.3.4"
          name: "Nurture leads through automated journey orchestration"
          agentic_profile: "h+A"
          agentic_note: "Agents orchestrate multi-touch journeys; humans design journey logic"
        - id: "274891"
          number: "3.3.5"
          name: "Manage the marketing-to-sales handover process"
          agentic_profile: "H=A"
          agentic_note: "Agents route and notify; humans ensure quality and context transfer"
        - id: "856423"
          number: "3.3.6"
          name: "Optimise conversion rates across the demand funnel"
          agentic_profile: "h+A"
          agentic_note: "Agents run tests and recommend optimisations; humans approve changes"

    - id: "731562"
      number: "3.4"
      name: "Create and Manage Content at Scale"
      description: >
        Develop, produce, manage, and distribute content across all formats and channels —
        from thought leadership and editorial through to performance content and sales
        enablement materials.
      processes:
        - id: "482913"
          number: "3.4.1"
          name: "Define content strategy and editorial direction"
          agentic_profile: H
          agentic_note: "Human-led; content strategy requires brand voice and audience understanding"
        - id: "613724"
          number: "3.4.2"
          name: "Plan and manage the content calendar and production pipeline"
          agentic_profile: "H=A"
          agentic_note: "Agents schedule and track production; humans set priorities"
        - id: "348276"
          number: "3.4.3"
          name: "Produce written, visual, and multimedia content"
          agentic_profile: "H=A"
          agentic_note: "Agents generate drafts and variations; humans create, edit, and approve"
        - id: "926481"
          number: "3.4.4"
          name: "Localise and adapt content for markets and segments"
          agentic_profile: "h+A"
          agentic_note: "Agents translate and adapt; humans review cultural nuance"
        - id: "157342"
          number: "3.4.5"
          name: "Manage the content repository and asset lifecycle"
          agentic_profile: A
          agentic_note: "Agent-executed; automated tagging, versioning, and archival"
        - id: "594817"
          number: "3.4.6"
          name: "Measure content performance and optimise the content mix"
          agentic_profile: "h+A"
          agentic_note: "Agents analyse engagement data; humans adjust strategy"

    - id: "215694"
      number: "3.5"
      name: "Operate Digital Channels and Campaign Execution"
      description: >
        Manage the enterprise's digital marketing presence — including website, social media,
        email, paid media, and emerging channels — ensuring coordinated execution and
        performance optimisation.
      processes:
        - id: "863241"
          number: "3.5.1"
          name: "Manage the enterprise web presence and SEO"
          agentic_profile: "H=A"
          agentic_note: "Agents monitor rankings and suggest optimisations; humans approve changes"
        - id: "724518"
          number: "3.5.2"
          name: "Plan and execute paid media campaigns"
          agentic_profile: "h+A"
          agentic_note: "Agents manage bids, placements, and budgets in real time; humans set strategy"
        - id: "491362"
          number: "3.5.3"
          name: "Operate social media channels and community engagement"
          agentic_profile: "H=A"
          agentic_note: "Agents schedule posts and monitor engagement; humans create content and engage"
        - id: "358714"
          number: "3.5.4"
          name: "Execute email and marketing automation programmes"
          agentic_profile: "h+A"
          agentic_note: "Agents personalise and send; humans design programmes and review performance"
        - id: "642839"
          number: "3.5.5"
          name: "Manage emerging and experimental channels"
          agentic_profile: "H+a"
          agentic_note: "Humans explore new channels; agents track performance baselines"

    - id: "847231"
      number: "3.6"
      name: "Measure Marketing Performance and Attribution"
      description: >
        Establish and operate the measurement, analytics, and attribution systems that
        quantify marketing's contribution to business outcomes and enable data-driven
        resource allocation.
      processes:
        - id: "321468"
          number: "3.6.1"
          name: "Define marketing measurement frameworks and KPIs"
          agentic_profile: "H+a"
          agentic_note: "Humans define what matters; agents recommend benchmark targets"
        - id: "759312"
          number: "3.6.2"
          name: "Implement and maintain marketing attribution models"
          agentic_profile: "h+A"
          agentic_note: "Agents build and calibrate models; humans validate methodology"
        - id: "284537"
          number: "3.6.3"
          name: "Collect and integrate marketing performance data"
          agentic_profile: A
          agentic_note: "Agent-executed; automated data pipeline from all marketing systems"
        - id: "563819"
          number: "3.6.4"
          name: "Analyse campaign and channel effectiveness"
          agentic_profile: "h+A"
          agentic_note: "Agents analyse and surface insights; humans interpret and act"
        - id: "418726"
          number: "3.6.5"
          name: "Report marketing ROI and contribution to revenue"
          agentic_profile: "h+A"
          agentic_note: "Agents generate dashboards and reports; humans present to leadership"
        - id: "937214"
          number: "3.6.6"
          name: "Conduct marketing mix modelling and budget optimisation"
          agentic_profile: "h+A"
          agentic_note: "Agents model scenarios; humans decide reallocation"

    - id: "694238"
      number: "3.7"
      name: "Understand Customers and Research Markets"
      description: >
        Systematically gather, analyse, and distribute customer insights and market
        intelligence that inform product, marketing, and sales decisions across the
        enterprise.
      processes:
        - id: "524183"
          number: "3.7.1"
          name: "Design and commission market research studies"
          agentic_profile: "H+a"
          agentic_note: "Humans define research questions; agents identify methodologies and vendors"
        - id: "871342"
          number: "3.7.2"
          name: "Conduct primary and secondary market research"
          agentic_profile: "H=A"
          agentic_note: "Agents gather and process data; humans conduct qualitative research"
        - id: "419563"
          number: "3.7.3"
          name: "Build and maintain customer personas and journey maps"
          agentic_profile: "H=A"
          agentic_note: "Agents aggregate behavioural data; humans craft narrative personas"
        - id: "362714"
          number: "3.7.4"
          name: "Monitor competitive positioning and market dynamics"
          agentic_profile: "h+A"
          agentic_note: "Agents continuously track competitors; humans assess strategic implications"
        - id: "738291"
          number: "3.7.5"
          name: "Distribute insights and embed market intelligence in decisions"
          agentic_profile: "H=A"
          agentic_note: "Agents push relevant insights to stakeholders; humans contextualise"
