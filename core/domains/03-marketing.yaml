domain:
  id: "729415"
  number: 3
  name: "Marketing"
  subtitle: "Building demand and shaping perception"
  classification: value_chain
  description: >
    This domain encompasses the enterprise's ability to understand its markets, build
    compelling brand narratives, generate demand, and attract qualified prospects. It spans
    the full marketing spectrum from strategic planning and brand stewardship through to
    campaign execution, content production, and performance measurement.

    In a ZORBA-enabled enterprise, marketing is where agentic scale meets human creativity
    — with agents producing content variations at unprecedented speed, optimising campaigns
    in real time, automating attribution analysis, and freeing marketers to focus on strategy,
    storytelling, and brand authenticity.

  capabilities:
    - id: "418362"
      number: "3.1"
      name: "Develop Marketing Strategy and Planning"
      description: >
        Define the marketing strategy, set objectives, allocate budgets, and establish the
        planning frameworks that guide all marketing activity. This capability ensures
        marketing investments are strategically aligned and measurably effective.
      processes:
        - id: "629471"
          number: "3.1.1"
          name: "Define marketing objectives and strategic priorities"
          agentic_profile: H
          agentic_note: "Human-led; marketing strategy requires market intuition and brand judgement"
          measurements:
            - id: "030101"
              number: "3.1.1.M1"
              name: "Marketing Objective Achievement"
              what: "Percentage of objectives meeting targets"
              why: "Tracks strategy effectiveness"
              how: "Objectives meeting targets / Total objectives × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "030102"
              number: "3.1.1.M2"
              name: "Strategy Review Adherence"
              what: "Whether strategy reviews occur on schedule"
              why: "Regular reviews ensure relevance"
              how: "Reviews on time / Reviews scheduled × 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "814253"
          number: "3.1.2"
          name: "Segment markets and identify target audiences"
          agentic_profile: "h+A"
          agentic_note: "Agents cluster data and model segments; humans validate and name segments"
          measurements:
            - id: "030201"
              number: "3.1.2.M1"
              name: "Segment Validation Rate"
              what: "Percentage of segments validated by buying behaviour"
              why: "Invalid segments waste targeting resources"
              how: "Validated / Total identified segments × 100"
              frequency: annually
              direction: higher_is_better
            - id: "030202"
              number: "3.1.2.M2"
              name: "Target Audience Reach"
              what: "Percentage of target audience reached"
              why: "Low reach indicates targeting gaps"
              how: "Unique reached / Total target audience × 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "537184"
          number: "3.1.3"
          name: "Develop annual and campaign-level marketing plans"
          agentic_profile: "H+a"
          agentic_note: "Humans plan; agents model budget scenarios and channel mix"
          measurements:
            - id: "030301"
              number: "3.1.3.M1"
              name: "Plan Execution Rate"
              what: "Percentage of planned activities executed"
              why: "Unexecuted plans miss opportunities"
              how: "Executed / Planned activities × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "030302"
              number: "3.1.3.M2"
              name: "Campaign Launch Timeliness"
              what: "Percentage of campaigns launched on time"
              why: "Late campaigns miss market windows"
              how: "On-time launches / Total campaigns × 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "293647"
          number: "3.1.4"
          name: "Allocate and manage marketing budgets"
          agentic_profile: "H=A"
          agentic_note: "Agents optimise allocation models; humans approve and adjust"
          measurements:
            - id: "030401"
              number: "3.1.4.M1"
              name: "Marketing Budget Variance"
              what: "Deviation of actual from approved budget"
              why: "Budget discipline ensures efficiency"
              how: "|Actual − Budget| / Budget × 100"
              frequency: monthly
              direction: lower_is_better
            - id: "030402"
              number: "3.1.4.M2"
              name: "Budget Utilisation Rate"
              what: "Percentage of budget actually deployed"
              why: "Underspending signals execution problems"
              how: "Actual spend / Approved budget × 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "461928"
          number: "3.1.5"
          name: "Define positioning and messaging frameworks"
          agentic_profile: "H+a"
          agentic_note: "Humans craft positioning; agents test messaging variations"
          measurements:
            - id: "030501"
              number: "3.1.5.M1"
              name: "Message Consistency Score"
              what: "Messaging consistency across channels"
              why: "Inconsistency confuses audiences"
              how: "Brand audit consistency score (1-10)"
              frequency: quarterly
              direction: higher_is_better
            - id: "030502"
              number: "3.1.5.M2"
              name: "Positioning Recall Rate"
              what: "Percentage recalling key positioning messages"
              why: "Low recall means messaging isn't landing"
              how: "Respondents recalling / Total surveyed × 100"
              frequency: annually
              direction: higher_is_better
        - id: "785312"
          number: "3.1.6"
          name: "Coordinate marketing calendar and cross-functional alignment"
          agentic_profile: "h+A"
          agentic_note: "Agents maintain calendars and flag conflicts; humans resolve priorities"
          measurements:
            - id: "030601"
              number: "3.1.6.M1"
              name: "Calendar Conflict Rate"
              what: "Percentage of activities with scheduling conflicts"
              why: "Conflicts reduce effectiveness"
              how: "Activities with conflicts / Total activities × 100"
              frequency: monthly
              direction: lower_is_better
            - id: "030602"
              number: "3.1.6.M2"
              name: "Cross-Functional Alignment Score"
              what: "Marketing alignment with other functions"
              why: "Misalignment creates waste"
              how: "Cross-functional survey score (1-10)"
              frequency: quarterly
              direction: higher_is_better

    - id: "562413"
      number: "3.2"
      name: "Steward the Brand and Communications"
      description: >
        Build, protect, and evolve the enterprise brand — ensuring consistency across all
        touchpoints, managing reputation, and orchestrating corporate and product
        communications.
      processes:
        - id: "348917"
          number: "3.2.1"
          name: "Define and maintain brand identity and guidelines"
          agentic_profile: H
          agentic_note: "Human-led; brand identity requires authentic creative vision"
          measurements:
            - id: "030701"
              number: "3.2.1.M1"
              name: "Brand Guideline Compliance"
              what: "Percentage of assets compliant with guidelines"
              why: "Non-compliance erodes brand equity"
              how: "Compliant / Total audited assets × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "030702"
              number: "3.2.1.M2"
              name: "Brand Identity Refresh Cycle"
              what: "Whether identity is reviewed within cadence"
              why: "Stale identity loses relevance"
              how: "Days since last review vs planned cycle"
              frequency: annually
              direction: lower_is_better
        - id: "721563"
          number: "3.2.2"
          name: "Manage brand consistency across channels and touchpoints"
          agentic_profile: "h+A"
          agentic_note: "Agents audit brand compliance; humans address strategic deviations"
          measurements:
            - id: "030801"
              number: "3.2.2.M1"
              name: "Brand Consistency Score"
              what: "Cross-channel consistency rating"
              why: "Inconsistency undermines trust"
              how: "Average consistency score across channels (1-10)"
              frequency: quarterly
              direction: higher_is_better
            - id: "030802"
              number: "3.2.2.M2"
              name: "Deviation Resolution Time"
              what: "Days to resolve brand deviations"
              why: "Unresolved deviations compound damage"
              how: "Resolution date − identification date (business days)"
              frequency: quarterly
              direction: lower_is_better
        - id: "495831"
          number: "3.2.3"
          name: "Plan and execute corporate communications"
          agentic_profile: "H=A"
          agentic_note: "Agents draft communications; humans approve tone and substance"
          measurements:
            - id: "030901"
              number: "3.2.3.M1"
              name: "Corporate Comms Reach"
              what: "Percentage of target audience reached"
              why: "Low reach indicates distribution gaps"
              how: "Reached / Target audience × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "030902"
              number: "3.2.3.M2"
              name: "Communication Approval Time"
              what: "Days from draft to approved communication"
              why: "Slow approval delays messaging"
              how: "Approval date − draft date (business days)"
              frequency: monthly
              direction: lower_is_better
        - id: "163274"
          number: "3.2.4"
          name: "Manage public relations and media engagement"
          agentic_profile: "H+a"
          agentic_note: "Humans manage relationships; agents monitor media and prepare briefs"
          measurements:
            - id: "031001"
              number: "3.2.4.M1"
              name: "Media Mention Volume"
              what: "Earned media mentions per period"
              why: "Coverage amplifies awareness"
              how: "Count of media mentions"
              frequency: monthly
              direction: higher_is_better
            - id: "031002"
              number: "3.2.4.M2"
              name: "Media Sentiment Score"
              what: "Ratio of positive to negative coverage"
              why: "Negative sentiment damages brand"
              how: "Positive / (Positive + Negative) × 100"
              frequency: monthly
              direction: higher_is_better
        - id: "842196"
          number: "3.2.5"
          name: "Monitor and manage brand reputation and sentiment"
          agentic_profile: "h+A"
          agentic_note: "Agents continuously track sentiment; humans respond to critical issues"
          measurements:
            - id: "031101"
              number: "3.2.5.M1"
              name: "Brand Sentiment Score"
              what: "Net sentiment across social and review platforms"
              why: "Negative sentiment erodes brand equity"
              how: "(Positive − Negative) / Total mentions × 100"
              frequency: monthly
              direction: higher_is_better
            - id: "031102"
              number: "3.2.5.M2"
              name: "Net Promoter Score (NPS)"
              what: "Customer willingness to recommend"
              why: "NPS correlates with growth"
              how: "% Promoters − % Detractors"
              frequency: quarterly
              direction: higher_is_better
        - id: "617428"
          number: "3.2.6"
          name: "Manage crisis communications and rapid response"
          agentic_profile: "H+a"
          agentic_note: "Humans lead crisis response; agents monitor situation and draft holding statements"
          measurements:
            - id: "031201"
              number: "3.2.6.M1"
              name: "Crisis Response Time"
              what: "Minutes from detection to first response"
              why: "Delayed response amplifies damage"
              how: "First response − detection (minutes)"
              frequency: quarterly
              direction: lower_is_better
            - id: "031202"
              number: "3.2.6.M2"
              name: "Crisis Communication Effectiveness"
              what: "Stakeholder confidence post-crisis"
              why: "Effective comms preserve trust"
              how: "Post-crisis survey score (1-10)"
              frequency: quarterly
              direction: higher_is_better

    - id: "384219"
      number: "3.3"
      name: "Generate Demand and Manage Lead Flow"
      description: >
        Attract, capture, nurture, and qualify prospective customers through integrated
        demand generation programmes. This capability ensures a healthy pipeline of
        marketing-qualified leads for the sales organisation.
      processes:
        - id: "529147"
          number: "3.3.1"
          name: "Design and execute demand generation campaigns"
          agentic_profile: "H=A"
          agentic_note: "Agents optimise targeting and bidding; humans set creative direction"
          measurements:
            - id: "031301"
              number: "3.3.1.M1"
              name: "Marketing Qualified Leads (MQLs)"
              what: "MQLs generated per period"
              why: "MQL volume drives pipeline growth"
              how: "Count of leads meeting MQL criteria"
              frequency: monthly
              direction: higher_is_better
            - id: "031302"
              number: "3.3.1.M2"
              name: "Cost per MQL"
              what: "Average cost to generate an MQL"
              why: "Tracks demand generation efficiency"
              how: "Total demand gen spend / Total MQLs"
              frequency: monthly
              direction: lower_is_better
        - id: "748213"
          number: "3.3.2"
          name: "Capture and enrich lead data from multiple sources"
          agentic_profile: A
          agentic_note: "Agent-executed; automated capture, deduplication, and enrichment"
          measurements:
            - id: "031401"
              number: "3.3.2.M1"
              name: "Lead Capture Rate"
              what: "Visitors converting to leads"
              why: "Low capture indicates friction"
              how: "Leads / Total visitors × 100"
              frequency: monthly
              direction: higher_is_better
            - id: "031402"
              number: "3.3.2.M2"
              name: "Lead Enrichment Rate"
              what: "Percentage of leads with complete data"
              why: "Incomplete data reduces scoring accuracy"
              how: "Fully enriched / Total leads × 100"
              frequency: monthly
              direction: higher_is_better
        - id: "391564"
          number: "3.3.3"
          name: "Score and qualify leads for sales readiness"
          agentic_profile: "h+A"
          agentic_note: "Agents score using behavioural and firmographic data; humans set thresholds"
          measurements:
            - id: "031501"
              number: "3.3.3.M1"
              name: "Lead Score Accuracy"
              what: "Correlation between scores and conversion"
              why: "Inaccurate scoring misallocates effort"
              how: "Correlation coefficient (score vs conversion)"
              frequency: quarterly
              direction: higher_is_better
            - id: "031502"
              number: "3.3.3.M2"
              name: "MQL-to-SQL Conversion Rate"
              what: "Percentage of MQLs accepted as SQLs"
              why: "Low conversion signals misalignment"
              how: "SQLs / MQLs × 100"
              frequency: monthly
              direction: higher_is_better
        - id: "613842"
          number: "3.3.4"
          name: "Nurture leads through automated journey orchestration"
          agentic_profile: "h+A"
          agentic_note: "Agents orchestrate multi-touch journeys; humans design journey logic"
          measurements:
            - id: "031601"
              number: "3.3.4.M1"
              name: "Nurture Engagement Rate"
              what: "Leads engaging with nurture content"
              why: "Disengaged leads unlikely to convert"
              how: "Engaged / Total in nurture × 100"
              frequency: monthly
              direction: higher_is_better
            - id: "031602"
              number: "3.3.4.M2"
              name: "Nurture-to-MQL Conversion"
              what: "Nurtured leads reaching MQL status"
              why: "Tracks nurture effectiveness"
              how: "Reaching MQL / Entering nurture × 100"
              frequency: monthly
              direction: higher_is_better
        - id: "274891"
          number: "3.3.5"
          name: "Manage the marketing-to-sales handover process"
          agentic_profile: "H=A"
          agentic_note: "Agents route and notify; humans ensure quality and context transfer"
          measurements:
            - id: "031701"
              number: "3.3.5.M1"
              name: "Handover Acceptance Rate"
              what: "Leads accepted by sales"
              why: "Low acceptance indicates quality issues"
              how: "Accepted / Passed to sales × 100"
              frequency: monthly
              direction: higher_is_better
            - id: "031702"
              number: "3.3.5.M2"
              name: "Handover Response Time"
              what: "Time for sales to action a lead"
              why: "Slow follow-up reduces conversion"
              how: "Average (first action − handover) in hours"
              frequency: monthly
              direction: lower_is_better
        - id: "856423"
          number: "3.3.6"
          name: "Optimise conversion rates across the demand funnel"
          agentic_profile: "h+A"
          agentic_note: "Agents run tests and recommend optimisations; humans approve changes"
          measurements:
            - id: "031801"
              number: "3.3.6.M1"
              name: "Funnel Conversion Rate"
              what: "Top-of-funnel to opportunity conversion"
              why: "Tracks end-to-end funnel effectiveness"
              how: "Opportunities / Total leads entering funnel × 100"
              frequency: monthly
              direction: higher_is_better
            - id: "031802"
              number: "3.3.6.M2"
              name: "Conversion Rate Improvement"
              what: "Period-over-period conversion improvement"
              why: "Tracks optimisation effectiveness"
              how: "(Current − Prior rate) / Prior rate × 100"
              frequency: quarterly
              direction: higher_is_better

    - id: "731562"
      number: "3.4"
      name: "Create and Manage Content at Scale"
      description: >
        Develop, produce, manage, and distribute content across all formats and channels —
        from thought leadership and editorial through to performance content and sales
        enablement materials.
      processes:
        - id: "482913"
          number: "3.4.1"
          name: "Define content strategy and editorial direction"
          agentic_profile: H
          agentic_note: "Human-led; content strategy requires brand voice and audience understanding"
          measurements:
            - id: "031901"
              number: "3.4.1.M1"
              name: "Content Strategy Alignment"
              what: "Content mapped to journey stages and personas"
              why: "Unmapped content may miss audiences"
              how: "Mapped / Total content pieces × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "031902"
              number: "3.4.1.M2"
              name: "Editorial Calendar Adherence"
              what: "Planned content published on schedule"
              why: "Missed publications create gaps"
              how: "Published on time / Planned × 100"
              frequency: monthly
              direction: higher_is_better
        - id: "613724"
          number: "3.4.2"
          name: "Plan and manage the content calendar and production pipeline"
          agentic_profile: "H=A"
          agentic_note: "Agents schedule and track production; humans set priorities"
          measurements:
            - id: "032001"
              number: "3.4.2.M1"
              name: "Content Production Velocity"
              what: "Content pieces produced per period"
              why: "Tracks team productivity"
              how: "Count of content pieces published"
              frequency: monthly
              direction: higher_is_better
            - id: "032002"
              number: "3.4.2.M2"
              name: "Production Cycle Time"
              what: "Days from brief to published piece"
              why: "Shorter cycles improve timeliness"
              how: "Publication date − brief date (business days)"
              frequency: monthly
              direction: lower_is_better
        - id: "348276"
          number: "3.4.3"
          name: "Produce written, visual, and multimedia content"
          agentic_profile: "H=A"
          agentic_note: "Agents generate drafts and variations; humans create, edit, and approve"
          measurements:
            - id: "032101"
              number: "3.4.3.M1"
              name: "Content Engagement Rate"
              what: "Average engagement across content"
              why: "Low engagement signals quality issues"
              how: "Engagements / Impressions × 100"
              frequency: monthly
              direction: higher_is_better
            - id: "032102"
              number: "3.4.3.M2"
              name: "Content Quality Score"
              what: "Editorial quality rating"
              why: "Quality drives engagement"
              how: "Average editorial review score (1-10)"
              frequency: monthly
              direction: higher_is_better
        - id: "926481"
          number: "3.4.4"
          name: "Localise and adapt content for markets and segments"
          agentic_profile: "h+A"
          agentic_note: "Agents translate and adapt; humans review cultural nuance"
          measurements:
            - id: "032201"
              number: "3.4.4.M1"
              name: "Localisation Coverage Rate"
              what: "Key content localised for target markets"
              why: "Unlocalised content limits penetration"
              how: "Localised / Requiring localisation × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "032202"
              number: "3.4.4.M2"
              name: "Localisation Cycle Time"
              what: "Days to localise for a new market"
              why: "Slow localisation delays campaigns"
              how: "Localised delivery − source date (business days)"
              frequency: quarterly
              direction: lower_is_better
        - id: "157342"
          number: "3.4.5"
          name: "Manage the content repository and asset lifecycle"
          agentic_profile: A
          agentic_note: "Agent-executed; automated tagging, versioning, and archival"
          measurements:
            - id: "032301"
              number: "3.4.5.M1"
              name: "Repository Completeness"
              what: "Assets properly tagged and catalogued"
              why: "Untagged content is effectively lost"
              how: "Tagged / Total assets × 100"
              frequency: quarterly
              direction: higher_is_better
            - id: "032302"
              number: "3.4.5.M2"
              name: "Content Freshness Rate"
              what: "Content reviewed within its lifecycle"
              why: "Stale content damages credibility"
              how: "Reviewed within lifecycle / Total content × 100"
              frequency: quarterly
              direction: higher_is_better
        - id: "594817"
          number: "3.4.6"
          name: "Measure content performance and optimise the content mix"
          agentic_profile: "h+A"
          agentic_note: "Agents analyse engagement data; humans adjust strategy"
          measurements:
            - id: "032401"
              number: "3.4.6.M1"
              name: "Content ROI"
              what: "Revenue attributed per dollar of content spend"
              why: "Tracks content investment effectiveness"
              how: "Revenue attributed / Content spend"
              frequency: quarterly
              direction: higher_is_better
            - id: "032402"
              number: "3.4.6.M2"
              name: "Top-Performing Content Ratio"
              what: "Content exceeding performance benchmarks"
              why: "Identifies strategy effectiveness"
              how: "Exceeding benchmarks / Total published × 100"
              frequency: quarterly
              direction: higher_is_better

    - id: "215694"
      number: "3.5"
      name: "Operate Digital Channels and Campaign Execution"
      description: >
        Manage the enterprise's digital marketing presence — including website, social media,
        email, paid media, and emerging channels — ensuring coordinated execution and
        performance optimisation.
      processes:
        - id: "863241"
          number: "3.5.1"
          name: "Manage the enterprise web presence and SEO"
          agentic_profile: "H=A"
          agentic_note: "Agents monitor rankings and suggest optimisations; humans approve changes"
          measurements:
            - id: "032501"
              number: "3.5.1.M1"
              name: "Organic Search Traffic"
              what: "Website visits from organic search"
              why: "Organic traffic is sustainable, low-cost"
              how: "Count of organic search sessions"
              frequency: monthly
              direction: higher_is_better
            - id: "032502"
              number: "3.5.1.M2"
              name: "Search Ranking Position"
              what: "Average position for priority keywords"
              why: "Higher rankings drive more traffic"
              how: "Average ranking across priority keywords"
              frequency: monthly
              direction: lower_is_better
        - id: "724518"
          number: "3.5.2"
          name: "Plan and execute paid media campaigns"
          agentic_profile: "h+A"
          agentic_note: "Agents manage bids, placements, and budgets in real time; humans set strategy"
          measurements:
            - id: "032601"
              number: "3.5.2.M1"
              name: "Paid Media ROAS"
              what: "Return on ad spend"
              why: "Tracks paid media efficiency"
              how: "Revenue attributed / Paid media spend"
              frequency: monthly
              direction: higher_is_better
            - id: "032602"
              number: "3.5.2.M2"
              name: "Cost per Click (CPC)"
              what: "Average cost per click"
              why: "Rising CPC reduces profitability"
              how: "Total spend / Total clicks"
              frequency: monthly
              direction: lower_is_better
        - id: "491362"
          number: "3.5.3"
          name: "Operate social media channels and community engagement"
          agentic_profile: "H=A"
          agentic_note: "Agents schedule posts and monitor engagement; humans create content and engage"
          measurements:
            - id: "032701"
              number: "3.5.3.M1"
              name: "Social Engagement Rate"
              what: "Engagement rate across platforms"
              why: "Engagement drives organic reach"
              how: "(Likes + Comments + Shares) / Impressions × 100"
              frequency: monthly
              direction: higher_is_better
            - id: "032702"
              number: "3.5.3.M2"
              name: "Social Audience Growth"
              what: "Month-over-month follower growth"
              why: "Growing audience expands reach"
              how: "(New − Lost followers) / Prior followers × 100"
              frequency: monthly
              direction: higher_is_better
        - id: "358714"
          number: "3.5.4"
          name: "Execute email and marketing automation programmes"
          agentic_profile: "h+A"
          agentic_note: "Agents personalise and send; humans design programmes and review performance"
          measurements:
            - id: "032801"
              number: "3.5.4.M1"
              name: "Email Open Rate"
              what: "Percentage of delivered emails opened"
              why: "Indicates subject line relevance"
              how: "Opened / Delivered × 100"
              frequency: monthly
              direction: higher_is_better
            - id: "032802"
              number: "3.5.4.M2"
              name: "Email Click-Through Rate"
              what: "Recipients clicking on links"
              why: "Measures content and CTA effectiveness"
              how: "Unique clicks / Delivered × 100"
              frequency: monthly
              direction: higher_is_better
        - id: "642839"
          number: "3.5.5"
          name: "Manage emerging and experimental channels"
          agentic_profile: "H+a"
          agentic_note: "Humans explore new channels; agents track performance baselines"
          measurements:
            - id: "032901"
