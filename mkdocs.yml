site_name: ZORBA
site_description: The open reference architecture for the agentic enterprise
site_url: https://zontally.github.io/zorba
repo_url: https://github.com/zontally/zorba
repo_name: zontally/zorba
theme:
  name: material
  logo: assets/logo-light.png
  favicon: assets/favicon.svg
  favicon: assets/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.highlight
    - content.code.copy
extra_css:
  - stylesheets/extra.css
nav:
  - Home: index.md
  - Framework:
      - Manifesto: framework/01-manifesto.md
      - Architecture: framework/02-architecture.md
      - Workforce Model: framework/03-workforce-model.md
      - Domain Reference: framework/04-domain-reference.md
      - Agentic Patterns: framework/05-agentic-patterns.md
      - Governance: framework/06-governance.md
      - Information Model: framework/07-information-model.md
      - Industry Editions: framework/08-industry-editions.md
      - Evolution Mapping: framework/09-evolution-mapping.md
      - Industry Taxonomy: framework/10-industry-taxonomy.md
      - Usage Guide: framework/11-usage-guide.md
      - Contributing: framework/12-contributing.md
      - Glossary: framework/13-glossary.md
  - Industry taxonomy: industry-taxonomy/index.md
  - Domain Taxonomy: domains/index.md
  - Industry Editions:
      - ZORBA for Enterprise Software: editions/enterprise-software/index.md
      - ZORBA for Professional Services: editions/professional-services/index.md
markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - toc:
      permalink: true
