site_name: ZORBA
site_description: The open reference architecture for the agentic enterprise
site_url: https://zontally.github.io/zorba
repo_url: https://github.com/Zontally/zorba
repo_name: Zontally/zorba
theme:
  name: material
  logo: assets/logo-light.png
  favicon: assets/logo-dark.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.highlight
    - content.code.copy
extra_css:
  - stylesheets/extra.css
nav:
  - Home: index.md
  - Framework:
      - Manifesto: framework/01-manifesto.md
      - Architecture: framework/02-architecture.md
      - Workforce Model: framework/03-workforce-model.md
      - Domain Reference: framework/04-domain-reference.md
      - Agentic Patterns: framework/05-agentic-patterns.md
      - Governance: framework/06-governance.md
      - Information Model: framework/07-information-model.md
      - Industry Editions: framework/08-industry-editions.md
      - Evolution Mapping: framework/09-evolution-mapping.md
      - Usage Guide: framework/10-usage-guide.md
      - Contributing: framework/11-contributing.md
      - Glossary: framework/12-glossary.md
  - Domain Taxonomy:
      - Overview: domains/index.md
      - Strategy & Governance: domains/01-strategy-and-governance.md
      - Product & Innovation: domains/02-product-and-innovation.md
      - Marketing: domains/03-marketing.md
      - Sales: domains/04-sales.md
      - Customer Success & Service: domains/05-customer-success-and-service.md
      - Operations & Delivery: domains/06-operations-and-delivery.md
      - Supply Chain: domains/07-supply-chain.md
      - Finance: domains/08-finance.md
      - People & Talent: domains/09-people-and-talent.md
      - Technology & Data: domains/10-technology-and-data.md
      - Risk, Legal & Compliance: domains/11-risk-legal-and-compliance.md
      - Corporate Services: domains/12-corporate-services.md
  - Industry Editions:
      - ZORBA for Public Sector:
          - Overview: editions/public-sector/index.md
          - Domains:
              - Overview: editions/public-sector/domains/index.md
              - Strategy & Governance: editions/public-sector/domains/01-strategy-governance.md
              - Product & Innovation: editions/public-sector/domains/02-product-innovation.md
              - Marketing: editions/public-sector/domains/03-marketing.md
              - Citizen Engagement & Service Delivery: editions/public-sector/domains/04-citizen-engagement-service-delivery.md
              - Customer Success & Service: editions/public-sector/domains/05-customer-success-service.md
              - Operations & Delivery: editions/public-sector/domains/06-operations-delivery.md
              - Supply Chain: editions/public-sector/domains/07-supply-chain.md
              - Finance: editions/public-sector/domains/08-finance.md
              - People & Talent: editions/public-sector/domains/09-people-talent.md
              - Technology & Data: editions/public-sector/domains/10-technology-data.md
              - Risk, Legal & Compliance: editions/public-sector/domains/11-risk-legal-compliance.md
              - Corporate Services: editions/public-sector/domains/12-corporate-services.md
markdown_extensions:
  - tables
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - toc:
      permalink: true
